<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1890ff">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="座位管理">
<title>图书馆座位分时段图片管理</title>
<script src="https://cdn.jsdelivr.net/npm/jszip@3/dist/jszip.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;font-size:15px;color:#333;background:#f0f2f5;-webkit-tap-highlight-color:transparent}
#app{max-width:480px;margin:0 auto;padding:12px 10px 100px;min-height:100vh}

.page-header{display:flex;align-items:center;justify-content:center;padding:14px 0 10px;gap:8px;flex-wrap:wrap}
.page-title{font-size:20px;font-weight:700;color:#1a1a1a;letter-spacing:1px}
.header-btn{padding:6px 12px;font-size:12px;font-weight:600;border:none;border-radius:6px;color:#fff;cursor:pointer;white-space:nowrap}
.header-btn:active{opacity:.7}
.btn-cleanup{background:#ff4d4f}
.btn-batch-dl{background:#722ed1}

.floor-btn{display:block;width:100%;padding:16px 20px;margin:8px 0;font-size:18px;font-weight:600;border:none;border-radius:10px;color:#fff;cursor:pointer;text-align:left;transition:transform .1s}
.floor-btn:active{transform:scale(.97)}
.floor-btn .arrow{float:right;font-size:14px;transition:transform .25s;display:inline-block}
.floor-btn.expanded .arrow{transform:rotate(90deg)}
.floor-btn .floor-count{float:right;font-size:13px;font-weight:400;margin-right:8px;opacity:.85}
.floor-1{background:linear-gradient(135deg,#667eea,#764ba2)}
.floor-2{background:linear-gradient(135deg,#f093fb,#f5576c)}
.floor-3{background:linear-gradient(135deg,#4facfe,#00f2fe)}
.floor-4{background:linear-gradient(135deg,#43e97b,#38f9d7)}
.floor-5{background:linear-gradient(135deg,#fa709a,#fee140)}

.area-container{display:none;padding:4px 0 8px 16px}
.area-container.show{display:block}
.area-btn{display:inline-flex;flex-direction:column;align-items:center;padding:12px 20px;margin:5px 4px;font-size:16px;font-weight:600;border:none;border-radius:8px;background:#fff;color:#333;cursor:pointer;box-shadow:0 1px 4px rgba(0,0,0,.12);transition:transform .1s}
.area-btn:active{transform:scale(.95)}
.area-btn .arrow{margin-left:6px;font-size:12px;transition:transform .25s;display:inline-block}
.area-btn .area-count{font-size:11px;font-weight:400;color:#999;margin-top:2px}
.area-btn.expanded .arrow{transform:rotate(90deg)}
.area-btn.expanded{background:#e6f7ff;box-shadow:0 2px 8px rgba(24,144,255,.2)}
.area-btn.has-images{border:2px solid #52c41a;background:linear-gradient(135deg,#f6ffed,#d9f7be);color:#389e0d}
.area-btn.has-images.expanded{border-color:#1890ff;background:#e6f7ff;color:#333}

.seat-container{display:none;padding:8px 0}
.seat-container.show{display:block}
.seat-flow{display:flex;flex-wrap:wrap;gap:6px;padding:0 2px}
.seat-btn{width:calc(20% - 5px);padding:10px 2px;font-size:13px;font-weight:500;border:2px solid #d9d9d9;border-radius:6px;background:#fff;cursor:pointer;text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;transition:background .15s,border-color .15s}
.seat-btn:active{background:#e6f7ff}
.seat-btn.expanded{background:#e6f7ff;border-color:#1890ff}
.seat-btn.has-images{border-color:#52c41a;background:linear-gradient(135deg,#f6ffed,#d9f7be);color:#389e0d;font-weight:700}
.seat-btn.has-images.expanded{border-color:#1890ff;background:#e6f7ff;color:#333;font-weight:500}
.add-seat-btn{width:calc(20% - 5px);padding:10px 2px;font-size:20px;font-weight:700;border:2px dashed #bfbfbf;border-radius:6px;background:#fafafa;cursor:pointer;text-align:center;color:#8c8c8c;transition:all .15s}
.add-seat-btn:active{background:#e6f7ff;border-color:#1890ff;color:#1890ff}

.timeslot-container{display:none;width:100%;padding:8px 0}
.timeslot-container.show{display:block}
.seat-header{display:flex;align-items:center;padding:8px 4px 10px;gap:8px;flex-wrap:wrap}
.seat-header-label{font-size:15px;color:#666}
.seat-name-text{font-size:17px;font-weight:700;color:#1890ff;cursor:pointer;border-bottom:1px dashed #1890ff;padding-bottom:1px}
.seat-name-hint{font-size:12px;color:#999;margin-left:4px}
.seat-name-edit-input{font-size:17px;font-weight:700;color:#1890ff;border:none;border-bottom:2px solid #1890ff;outline:none;background:transparent;width:120px;padding-bottom:1px}
.btn-delete-seat{padding:4px 12px;font-size:12px;font-weight:600;border:1px solid #ff4d4f;border-radius:4px;background:#fff;color:#ff4d4f;cursor:pointer;margin-left:auto}
.btn-delete-seat:active{background:#fff1f0}

.timeslot-card{background:#fff;border-radius:8px;margin:6px 0;padding:6px 10px;box-shadow:0 1px 3px rgba(0,0,0,.08);cursor:pointer;display:flex;align-items:center;gap:6px;min-height:44px;flex-wrap:wrap}
.ts-top{display:flex;align-items:center;gap:6px;flex:1;min-width:0}
.ts-checkbox{width:22px;height:22px;border-radius:50%;border:2px solid #bbb;background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s}
.ts-checkbox.checked{background:#1890ff;border-color:#1890ff}
.ts-checkbox.checked::after{content:'✓';color:#fff;font-size:14px;font-weight:700}
.ts-checkbox.disabled{border-color:#e0e0e0;background:#f5f5f5;cursor:not-allowed;opacity:.5}
.ts-time{font-size:15px;font-weight:600;color:#333;white-space:nowrap}
.ts-btns{display:flex;gap:4px;flex-shrink:0;margin-left:auto}
.ts-btn{padding:0 10px;font-size:13px;font-weight:600;border:none;border-radius:5px;cursor:pointer;transition:opacity .15s;min-height:36px;min-width:44px;display:flex;align-items:center;justify-content:center}
.ts-btn:active{opacity:.7}
.ts-btn-capture{background:#1890ff;color:#fff}
.ts-btn-upload{background:#52c41a;color:#fff}
.ts-btn:disabled{opacity:.4;cursor:not-allowed}
.ts-thumbs{display:flex;gap:6px;flex-wrap:wrap;margin-top:4px;padding-left:28px;width:100%}
.thumb-wrap{position:relative;width:80px;height:80px;border-radius:6px;overflow:hidden;border:1px solid #e8e8e8;flex-shrink:0}
.thumb-wrap img{width:100%;height:100%;object-fit:cover;cursor:pointer;background:#f0f0f0}
.thumb-wrap img[data-thumb-src]:not([src]){min-width:80px;min-height:80px}
.thumb-del{position:absolute;top:2px;right:2px;width:22px;height:22px;border-radius:50%;background:rgba(0,0,0,.55);color:#fff;font-size:14px;line-height:22px;text-align:center;cursor:pointer;z-index:2}
.thumb-del:active{background:rgba(255,0,0,.7)}

#bottom-bar{display:none;position:fixed;bottom:0;left:0;right:0;background:#fff;box-shadow:0 -2px 8px rgba(0,0,0,.12);padding:10px 12px;z-index:100;max-width:480px;margin:0 auto;flex-wrap:wrap}
#bottom-bar.show{display:flex;align-items:center;gap:8px}
#selected-count{font-size:13px;color:#666;flex-shrink:0;white-space:nowrap}
#btn-clear-select{padding:8px 12px;font-size:13px;border:1px solid #d9d9d9;border-radius:6px;background:#fff;color:#666;cursor:pointer;flex-shrink:0}
.bar-btn{padding:12px 10px;font-size:14px;font-weight:600;border:none;border-radius:8px;cursor:pointer;flex:1;min-width:0;white-space:nowrap}
.bar-btn:active{opacity:.8}
#btn-download-separate{background:#1890ff;color:#fff;flex-shrink:0;min-width:auto}
#btn-download-concat{background:#fa8c16;color:#fff}

#preview-modal{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.92);z-index:200;overflow:hidden}
#preview-modal.show{display:block}
#preview-close{position:absolute;top:12px;right:16px;font-size:32px;color:#fff;cursor:pointer;z-index:201;width:44px;height:44px;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.3);border-radius:50%}
#preview-scroller{position:absolute;top:0;left:0;right:0;bottom:0;display:flex;overflow-x:auto;overflow-y:hidden;scroll-snap-type:x mandatory;-webkit-overflow-scrolling:touch;scrollbar-width:none}
#preview-scroller::-webkit-scrollbar{display:none}
#preview-scroller.pv-no-scroll{overflow-x:hidden}
.pv-slide{flex:0 0 100%;width:100%;height:100%;display:flex;align-items:center;justify-content:center;scroll-snap-align:center;position:relative}
.pv-slide img{max-width:95vw;max-height:85vh;object-fit:contain;border-radius:4px;transform-origin:0 0;-webkit-user-select:none;user-select:none;-webkit-touch-callout:none;pointer-events:none;will-change:transform}
#preview-save-btn{position:absolute;bottom:50px;left:50%;transform:translateX(-50%);padding:10px 28px;font-size:14px;font-weight:600;border:none;border-radius:8px;background:rgba(24,144,255,.9);color:#fff;cursor:pointer;z-index:202;box-shadow:0 2px 12px rgba(24,144,255,.4)}
#preview-save-btn:active{opacity:.8}
#preview-indicator{position:absolute;bottom:90px;left:50%;transform:translateX(-50%);color:rgba(255,255,255,.7);font-size:14px;pointer-events:none;z-index:201}
#preview-hint{position:absolute;bottom:20px;left:50%;transform:translateX(-50%);color:rgba(255,255,255,.4);font-size:12px;pointer-events:none}

.modal-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);z-index:250;align-items:center;justify-content:center}
.modal-overlay.show{display:flex}
.modal-box{background:#fff;border-radius:12px;padding:20px 16px;width:92%;max-width:400px;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);max-height:85vh;overflow-y:auto}
.modal-box h3{font-size:17px;margin-bottom:12px;text-align:center}
.modal-btns{display:flex;gap:10px;margin-top:16px}
.modal-btns button{flex:1;padding:12px;font-size:15px;font-weight:600;border:none;border-radius:8px;cursor:pointer}
.modal-btns button:active{opacity:.8}
.modal-cancel{background:#f0f0f0;color:#333}
.modal-confirm{background:#722ed1;color:#fff}

.batch-section{margin-bottom:12px}
.batch-section h4{font-size:14px;margin-bottom:8px;color:#666}
.batch-grid{display:flex;flex-wrap:wrap;gap:6px}
.batch-chip{padding:6px 12px;font-size:13px;border:1px solid #d9d9d9;border-radius:6px;background:#fff;cursor:pointer;user-select:none;transition:all .1s}
.batch-chip.checked{background:#722ed1;color:#fff;border-color:#722ed1}
.batch-chip:active{opacity:.7}
.batch-select-all{padding:6px 12px;font-size:12px;border:1px dashed #722ed1;border-radius:6px;background:#fff;color:#722ed1;cursor:pointer}
.batch-select-all:active{opacity:.7}

.picker-row{display:flex;gap:4px;margin-bottom:16px;height:160px;position:relative;background:#f5f5f5;border-radius:8px;overflow:hidden}
.picker-col{flex:1;height:100%;overflow-y:auto;scroll-snap-type:y mandatory;-webkit-overflow-scrolling:touch;position:relative}
.picker-col::-webkit-scrollbar{display:none}
.picker-pad{height:60px}
.picker-item{height:40px;line-height:40px;text-align:center;font-size:16px;scroll-snap-align:center;cursor:pointer;color:#666;transition:color .15s}
.picker-item.active{color:#1890ff;font-weight:700;font-size:18px}
.picker-highlight{position:absolute;top:60px;left:0;right:0;height:40px;border-top:1px solid #d9d9d9;border-bottom:1px solid #d9d9d9;background:rgba(24,144,255,.06);pointer-events:none;z-index:1}
.picker-col-label{position:absolute;top:4px;width:100%;text-align:center;font-size:11px;color:#999;z-index:2;pointer-events:none}
.cleanup-btns{display:flex;gap:10px}
.cleanup-btns button{flex:1;padding:12px;font-size:15px;font-weight:600;border:none;border-radius:8px;cursor:pointer}
.cleanup-btns button:active{opacity:.8}
.cleanup-cancel{background:#f0f0f0;color:#333}
.cleanup-exec{background:#ff4d4f;color:#fff}

.toast{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(0,0,0,.75);color:#fff;padding:14px 28px;border-radius:8px;font-size:15px;z-index:300;pointer-events:none;animation:toast-fade 2s forwards}
@keyframes toast-fade{0%{opacity:1}70%{opacity:1}100%{opacity:0}}

/* 时段筛选按钮 */
.btn-filter{background:#fa8c16;font-size:13px;padding:6px 12px;font-weight:600;border:none;border-radius:6px;color:#fff;cursor:pointer;white-space:nowrap;display:inline-flex;align-items:center;gap:4px}
.btn-filter:active{opacity:.7}
.btn-filter .filter-icon{font-size:14px}

/* 筛选底部面板 */
.filter-sheet-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.45);z-index:260}
.filter-sheet-overlay.show{display:block}
.filter-sheet{position:fixed;left:0;right:0;bottom:0;background:#fff;border-radius:16px 16px 0 0;z-index:261;transform:translateY(100%);transition:transform .3s ease;max-height:75vh;display:flex;flex-direction:column;max-width:480px;margin:0 auto}
.filter-sheet.show{transform:translateY(0)}
.filter-sheet-header{display:flex;align-items:center;justify-content:space-between;padding:16px 20px 12px;border-bottom:1px solid #f0f0f0;flex-shrink:0}
.filter-sheet-title{font-size:17px;font-weight:700;color:#1a1a1a}
.filter-sheet-close{width:36px;height:36px;border:none;background:#f5f5f5;border-radius:50%;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#999}
.filter-sheet-close:active{background:#e8e8e8}
.filter-sheet-actions{display:flex;gap:8px;padding:12px 20px;border-bottom:1px solid #f0f0f0;flex-shrink:0}
.filter-action-btn{flex:1;padding:10px 0;font-size:13px;font-weight:600;border:1px solid #d9d9d9;border-radius:8px;background:#fff;color:#333;cursor:pointer;min-height:44px;display:flex;align-items:center;justify-content:center}
.filter-action-btn:active{background:#f5f5f5}
.filter-action-btn.primary{border-color:#1890ff;color:#1890ff;background:#e6f7ff}
.filter-action-btn.primary:active{background:#bae7ff}
.filter-sheet-body{overflow-y:auto;padding:8px 20px 24px;flex:1;-webkit-overflow-scrolling:touch}
.filter-slot-item{display:flex;align-items:center;padding:10px 0;min-height:44px;gap:12px;border-bottom:1px solid #f5f5f5;cursor:pointer}
.filter-slot-item:last-child{border-bottom:none}
.filter-slot-item:active{background:#fafafa}
.filter-slot-cb{width:22px;height:22px;border-radius:4px;border:2px solid #bbb;background:#fff;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .15s}
.filter-slot-cb.checked{background:#1890ff;border-color:#1890ff}
.filter-slot-cb.checked::after{content:'✓';color:#fff;font-size:14px;font-weight:700}
.filter-slot-label{font-size:15px;color:#333;font-weight:500}
.filter-slot-label.passed{color:#999}
</style>
</head>
<body>
<div id="app"></div>
<div id="bottom-bar">
  <span id="selected-count">已选 0 个时段</span>
  <button id="btn-clear-select">取消全选</button>
  <button class="bar-btn" id="btn-download-separate">分享选中图片</button>
  <button class="bar-btn" id="btn-download-concat">拼接下载</button>
</div>
<div id="preview-modal">
  <div id="preview-close">&times;</div>
  <div id="preview-scroller"></div>
  <div id="preview-indicator"></div>
  <button id="preview-save-btn">保存图片</button>
  <div id="preview-hint">双指缩放 · 左右滑动 · 下滑关闭</div>
</div>
<div class="modal-overlay" id="batch-modal">
  <div class="modal-box">
    <h3>批量下载</h3>
    <div class="batch-section"><h4>选择区域 <button class="batch-select-all" data-target="area">全选/取消</button></h4><div class="batch-grid" id="batch-areas"></div></div>
    <div class="batch-section"><h4>选择时段 <button class="batch-select-all" data-target="time">全选/取消</button></h4><div class="batch-grid" id="batch-times"></div></div>
    <div class="modal-btns"><button class="modal-cancel" id="batch-cancel">取消</button><button class="modal-confirm" id="batch-exec">打包下载(ZIP)</button></div>
  </div>
</div>
<div class="modal-overlay" id="cleanup-modal">
  <div class="modal-box">
    <h3>批量清理图片</h3>
    <p style="font-size:13px;color:#666;margin-bottom:14px;text-align:center">删除所选日期<strong>之前</strong>添加的所有图片（默认今天）</p>
    <div class="picker-row">
      <div class="picker-highlight"></div>
      <div class="picker-col" id="picker-year"><div class="picker-col-label">年</div><div class="picker-pad"></div></div>
      <div class="picker-col" id="picker-month"><div class="picker-col-label">月</div><div class="picker-pad"></div></div>
      <div class="picker-col" id="picker-day"><div class="picker-col-label">日</div><div class="picker-pad"></div></div>
    </div>
    <div class="cleanup-btns"><button class="cleanup-cancel" id="cleanup-cancel-btn">取消</button><button class="cleanup-exec" id="cleanup-exec-btn">执行清理</button></div>
  </div>
</div>
<div class="filter-sheet-overlay" id="filter-overlay"></div>
<div class="filter-sheet" id="filter-sheet">
  <div class="filter-sheet-header"><span class="filter-sheet-title">选择显示时段（打勾为显示时段）</span><button class="filter-sheet-close" id="filter-close">&times;</button></div>
  <div class="filter-sheet-actions">
    <button class="filter-action-btn primary" id="filter-hide-passed">隐藏已过时段</button>
    <button class="filter-action-btn" id="filter-select-all">全选</button>
    <button class="filter-action-btn" id="filter-clear">清除</button>
  </div>
  <div class="filter-sheet-body" id="filter-body"></div>
</div>
<script>
// ============================================================
// 一、楼层/区域/座位配置
// ============================================================
// 每个区域：name=显示名, prefix=编号前缀, start=起始编号, count=座位数
const FLOORS = [
  { id: 1, name: '一楼', areas: [
    { name: '中庭', prefix: '中', start: 1001, count: 96 },
    { name: '报刊', prefix: '报', start: 1097, count: 130 }
  ]},
  { id: 2, name: '二楼', areas: [
    { name: '东区', prefix: '东', start: 2001, count: 84 },
    { name: '东区临时', prefix: '东临', start: 2085, count: 7 },
    { name: '南区', prefix: '南', start: 2001, count: 74 },
    { name: '西区', prefix: '西', start: 2001, count: 84 },
    { name: '北区', prefix: '北', start: 2001, count: 61 },
    { name: '青少年区', prefix: '青', start: 2001, count: 24 }
  ]},
  { id: 3, name: '三楼', areas: [
    { name: '东区', prefix: '东', start: 3001, count: 156 },
    { name: '东区临时', prefix: '东临', start: 3157, count: 42 },
    { name: '南区', prefix: '南', start: 3001, count: 66 },
    { name: '西区', prefix: '西', start: 3001, count: 110 },
    { name: '北区', prefix: '北', start: 3001, count: 62 }
  ]},
  { id: 4, name: '四楼', areas: [
    { name: '东区', prefix: '东', start: 4001, count: 36 },
    { name: '东区临时', prefix: '东临', start: 4037, count: 30 },
    { name: '南区', prefix: '南', start: 4001, count: 50 },
    { name: '西区', prefix: '西', start: 4001, count: 64 },
    { name: '北区', prefix: '北', start: 4001, count: 40 }
  ]},
  { id: 5, name: '五楼', areas: [
    { name: '东区', prefix: '东', start: 5001, count: 114 },
    { name: '东区临时', prefix: '东临', start: 5115, count: 28 },
    { name: '西区', prefix: '西', start: 5001, count: 64 },
    { name: '南区', prefix: '南', start: 5001, count: 16 }
  ]}
];

const TIME_SLOTS = ['09:00','09:30','10:00','10:30','11:00','12:00','13:00','13:30','14:00','14:30','15:00','15:30','16:00','16:30','17:00','18:00','18:30','19:00','19:30','20:00','20:30','21:00'];
const MAX_IMAGES = 3;
const DB_NAME = 'SeatImageDB';
const DB_VERSION = 4;

// ============================================================
// 二、IndexedDB
// ============================================================
let dbInstance = null;
function openDB() {
  if (dbInstance) return Promise.resolve(dbInstance);
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NAME, DB_VERSION);
    req.onupgradeneeded = (e) => {
      // 【修复】onupgradeneeded 加 try-catch 防止建表异常导致整个 DB 打开失败
      try {
        const db = e.target.result;
        if (!db.objectStoreNames.contains('cells')) db.createObjectStore('cells', { keyPath: 'key' });
        if (!db.objectStoreNames.contains('seatNames')) db.createObjectStore('seatNames', { keyPath: 'key' });
        if (!db.objectStoreNames.contains('extraSeats')) db.createObjectStore('extraSeats', { keyPath: 'key' });
        if (!db.objectStoreNames.contains('deletedSeats')) db.createObjectStore('deletedSeats', { keyPath: 'key' });
      } catch (err) {
        console.error('IndexedDB onupgradeneeded error:', err);
      }
    };
    req.onsuccess = (e) => { dbInstance = e.target.result; resolve(dbInstance); };
    req.onerror = (e) => reject(e.target.error);
  });
}
// 【修复】所有 DB 操作添加 tx.onabort 处理，避免事务中断时 Promise 永远 pending
async function dbPut(s, d) { const db = await openDB(); return new Promise((r, j) => { const tx = db.transaction(s, 'readwrite'); tx.objectStore(s).put(d); tx.oncomplete = () => r(); tx.onerror = (e) => j(e.target.error); tx.onabort = (e) => j(e.target.error); }); }
async function dbGet(s, k) { const db = await openDB(); return new Promise((r, j) => { const tx = db.transaction(s, 'readonly'); const req = tx.objectStore(s).get(k); req.onsuccess = () => r(req.result || null); tx.oncomplete = () => r(req.result || null); tx.onerror = (e) => j(e.target.error); tx.onabort = (e) => j(e.target.error); }); }
async function dbDelete(s, k) { const db = await openDB(); return new Promise((r, j) => { const tx = db.transaction(s, 'readwrite'); tx.objectStore(s).delete(k); tx.oncomplete = () => r(); tx.onerror = (e) => j(e.target.error); tx.onabort = (e) => j(e.target.error); }); }
async function dbGetAll(s) { const db = await openDB(); return new Promise((r, j) => { const tx = db.transaction(s, 'readonly'); const req = tx.objectStore(s).getAll(); req.onsuccess = () => r(req.result); tx.oncomplete = () => r(req.result || []); tx.onerror = (e) => j(e.target.error); tx.onabort = (e) => j(e.target.error); }); }
async function saveCellData(k, imgs) { await dbPut('cells', { key: k, images: imgs }); }
async function getCellData(k) { return await dbGet('cells', k); }
async function saveSeatName(k, n) { await dbPut('seatNames', { key: k, name: n }); }
async function getAllSeatNames() { const a = await dbGetAll('seatNames'); const m = {}; a.forEach(r => m[r.key] = r.name); return m; }
async function saveExtraSeat(k, n) { await dbPut('extraSeats', { key: k, count: n }); }
async function getAllExtraSeats() { const a = await dbGetAll('extraSeats'); const m = {}; a.forEach(r => m[r.key] = r.count); return m; }
async function saveDeletedSeat(k) { await dbPut('deletedSeats', { key: k }); }
async function getAllDeletedSeats() { const a = await dbGetAll('deletedSeats'); return new Set(a.map(r => r.key)); }

// 【优化】批量读取多个 key 的图片数据（单事务），避免逐条异步读取
async function getCellDataBatch(keys) {
  const db = await openDB();
  return new Promise((r, j) => {
    const tx = db.transaction('cells', 'readonly');
    const results = {};
    keys.forEach(k => {
      const req = tx.objectStore('cells').get(k);
      req.onsuccess = () => { if (req.result) results[k] = req.result; };
    });
    tx.oncomplete = () => r(results);
    tx.onerror = (e) => j(e.target.error);
    tx.onabort = (e) => j(e.target.error);
  });
}

// ============================================================
// 三、状态与工具函数
// ============================================================
const state = {
  expandedFloors: new Set(), expandedAreas: new Set(), expandedSeats: new Set(),
  selectedCells: [], seatNames: {}, seatHasImages: new Set(),
  extraSeats: {}, deletedSeats: new Set(),
  visibleTimeSlots: new Set(), _filterNone: false, // 时段筛选：空集+!_filterNone=全显，空集+_filterNone=全不显
};

/** 生成区域 key */
function areaKey(fid, aname) { return `${fid}-${aname}`; }
/** 生成座位 key */
function seatKey(fid, aname, idx) { return `${fid}-${aname}-${idx}`; }
/** 生成单元格 key */
function cellKey(fid, aname, sidx, tidx) { return `${fid}-${aname}-${sidx}-${tidx}`; }
/** 从单元格 key 提取座位 key */
function cellToSeatKey(ck) { return ck.split('-').slice(0, 3).join('-'); }

/** 获取某区域的配置（从 FLOORS 常量中查找） */
function getAreaConfig(fid, aname) {
  const floor = FLOORS.find(f => f.id === fid);
  return floor ? floor.areas.find(a => a.name === aname) : null;
}

/** 获取某区域的座位数量（基础 + 新增） */
function getAreaSeatCount(fid, aname) {
  const cfg = getAreaConfig(fid, aname);
  const base = cfg ? cfg.count : 0;
  const ak = areaKey(fid, aname);
  const extra = state.extraSeats[ak] || 0;
  return base + extra;
}

/** 获取座位默认编号 */
function defaultSeatName(fid, aname, idx) {
  const cfg = getAreaConfig(fid, aname);
  if (!cfg) return `${aname}${idx + 1}`;
  const baseCount = cfg.count;
  if (idx < baseCount) {
    // 基础座位：prefix + (start + idx)
    return `${cfg.prefix}${cfg.start + idx}`;
  } else {
    // 新增座位：prefix + (start + baseCount + (idx - baseCount))
    return `${cfg.prefix}${cfg.start + idx}`;
  }
}

/** 获取座位编号（优先自定义） */
function getSeatNameSync(fid, aname, idx) {
  const sk = seatKey(fid, aname, idx);
  return state.seatNames[sk] || defaultSeatName(fid, aname, idx);
}

/** 获取北京时间字符串 */
function getBeijingTime() {
  const now = new Date();
  const opts = { timeZone: 'Asia/Shanghai', year: 'numeric', month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false };
  const parts = new Intl.DateTimeFormat('zh-CN', opts).formatToParts(now);
  const get = (type) => parts.find(p => p.type === type).value;
  return `${get('year')}-${get('month')}-${get('day')} ${get('hour')}:${get('minute')}:${get('second')}`;
}

async function buildSeatHasImages() { const a = await dbGetAll('cells'); state.seatHasImages = new Set(); a.forEach(r => { if (r.images && r.images.length > 0) state.seatHasImages.add(r.key.split('-').slice(0, 3).join('-')); }); }
function saveUIState() { try { localStorage.setItem('seat_ui_state', JSON.stringify({ f: [...state.expandedFloors], a: [...state.expandedAreas], s: [...state.expandedSeats] })); } catch (e) {} }
function loadUIState() { try { const o = JSON.parse(localStorage.getItem('seat_ui_state')); if (o.f) state.expandedFloors = new Set(o.f); if (o.a) state.expandedAreas = new Set(o.a); if (o.s) state.expandedSeats = new Set(o.s); } catch (e) {} }

/** 保存时段筛选设置到 localStorage */
function saveFilterState() { try { localStorage.setItem('seat_time_filter', JSON.stringify({ slots: [...state.visibleTimeSlots], none: state._filterNone })); } catch (e) {} }
/** 加载时段筛选设置 */
function loadFilterState() { try { const o = JSON.parse(localStorage.getItem('seat_time_filter')); if (o && Array.isArray(o.slots)) { state.visibleTimeSlots = new Set(o.slots); state._filterNone = !!o.none; } } catch (e) {} }

/** 判断某时段索引是否在当前北京时间已过（严格大于时段时间为已过） */
function isTimeSlotPassed(tIdx) {
  const now = new Date();
  const opts = { timeZone: 'Asia/Shanghai', hour: '2-digit', minute: '2-digit', hour12: false };
  const parts = new Intl.DateTimeFormat('en-US', opts).formatToParts(now);
  // 【修复】处理某些 locale 返回 hour=24 的边界情况
  const h = parseInt(parts.find(p => p.type === 'hour').value) % 24;
  const m = parseInt(parts.find(p => p.type === 'minute').value);
  const nowMinutes = h * 60 + m;
  const slot = TIME_SLOTS[tIdx];
  const [sh, sm] = slot.split(':').map(Number);
  const slotMinutes = sh * 60 + sm;
  // 当前时间 > 时段时间表示该时段已过
  return nowMinutes > slotMinutes;
}

/** 判断某时段是否应该显示 */
function isTimeSlotVisible(tIdx) {
  // visibleTimeSlots 为空且无特殊标记时，默认全部显示
  if (state.visibleTimeSlots.size === 0 && !state._filterNone) return true;
  return state.visibleTimeSlots.has(tIdx);
}

function renderSeatFlow(fid, aname) {

async function renderTimeSlots(sk) {
  const container = document.getElementById('timeslots-' + sk);
  if (!container) return;
  const parts = sk.split('-'), fid = parseInt(parts[0]), aname = parts[1], sidx = parseInt(parts[2]);
  const sName = getSeatNameSync(fid, aname, sidx);
  let html = `<div class="seat-header"><span class="seat-header-label">座位编号：</span><span class="seat-name-text" data-action="edit-seat-name" data-seat-key="${sk}">${sName}</span><span class="seat-name-hint">（点击修改）</span><button class="btn-delete-seat" data-action="delete-seat" data-seat-key="${sk}">删除座位</button></div>`;
  // 【优化】批量读取该座位所有可见时段的数据，单事务避免多次异步
  const visibleKeys = [];
  for (let t = 0; t < TIME_SLOTS.length; t++) {
    if (isTimeSlotVisible(t)) visibleKeys.push(cellKey(fid, aname, sidx, t));
  }
  const cellDataMap = await getCellDataBatch(visibleKeys);
  let needThumbGen = false;
  for (let t = 0; t < TIME_SLOTS.length; t++) {
    if (!isTimeSlotVisible(t)) continue; // 筛选：跳过不可见时段
    const ck = cellKey(fid, aname, sidx, t);
    const cellData = cellDataMap[ck] || null;
    const images = (cellData && cellData.images) ? cellData.images : [];
    const hasImages = images.length > 0, isFull = images.length >= MAX_IMAGES, isSel = state.selectedCells.includes(ck);
    const cbClass = hasImages ? `ts-checkbox ${isSel ? 'checked' : ''}` : 'ts-checkbox disabled';
    html += `<div class="timeslot-card" data-action="toggle-card" data-cell-key="${ck}" data-has-images="${hasImages ? '1' : '0'}"><div class="ts-top"><div class="${cbClass}" data-action="toggle-select" data-cell-key="${ck}"></div><span class="ts-time">${TIME_SLOTS[t]}</span><div class="ts-btns"><button class="ts-btn ts-btn-capture" ${isFull ? 'disabled' : ''} data-action="capture" data-cell-key="${ck}">拍照</button><button class="ts-btn ts-btn-upload" ${isFull ? 'disabled' : ''} data-action="upload" data-cell-key="${ck}">上传</button></div></div>`;
    if (images.length > 0) {
      html += '<div class="ts-thumbs">';
      images.forEach((img, idx) => {
        const thumbSrc = img.thumbnail || img.thumb || '';

      });
      html += '</div>';
    }
    html += '</div>';
  }
  container.innerHTML = html;
  container.querySelectorAll('img[data-thumb-src]').forEach(img => thumbObserver.observe(img));
  if (needThumbGen) generateMissingThumbnails(fid, aname, sidx);
}

function updateSeatVisual(sk) {

function updateAreaVisual(fid, aname) {

// ============================================================
// 五、图片压缩与水印
// ============================================================

/** 将图片重新编码为 JPEG，保持原分辨率，用于统一存储格式 */
function compressImage(imageData, quality = 0.95) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.onload = () => {
      const canvas = document.createElement('canvas');
      canvas.width = img.naturalWidth; canvas.height = img.naturalHeight;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0);
      resolve(canvas.toDataURL('image/jpeg', quality));
    };
    img.onerror = () => reject(new Error('图片压缩失败'));
    img.src = imageData;
  });
}

/** 添加水印（左下角，动态字体，两行：座位编号 + 北京时间），输出 JPEG 0.95 */
function addWatermark(imageData, seatName, beijingTime) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.onload = () => {
      const canvas = document.createElement('canvas');
      canvas.width = img.naturalWidth; canvas.height = img.naturalHeight;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0);
      // 字体大小根据图片短边动态计算：短边×8%，限制在24~120px
      const shortSide = Math.min(img.naturalWidth, img.naturalHeight);
      const fs = Math.max(24, Math.min(120, Math.round(shortSide * 0.08)));
      const pad = Math.max(8, Math.round(fs * 0.17)), lineGap = Math.max(4, Math.round(fs * 0.13));
      const r = Math.max(4, Math.round(fs * 0.13));
      ctx.font = `bold ${fs}px sans-serif`;
      // 第一行：座位编号
      const line1 = seatName;
      const tw1 = ctx.measureText(line1).width;
      // 第二行：北京时间
      const line2 = beijingTime;
      const tw2 = ctx.measureText(line2).width;
      const maxTW = Math.max(tw1, tw2);
      const totalH = fs * 2 + lineGap;
      const bgX = pad, bgY = canvas.height - totalH - pad * 2 - pad;
      const bgW = maxTW + pad * 2, bgH = totalH + pad * 2;
      // 半透明圆角背景
      ctx.fillStyle = 'rgba(0,0,0,0.5)';
      ctx.beginPath();
      ctx.moveTo(bgX + r, bgY); ctx.lineTo(bgX + bgW - r, bgY);
      ctx.quadraticCurveTo(bgX + bgW, bgY, bgX + bgW, bgY + r);
      ctx.lineTo(bgX + bgW, bgY + bgH - r);
      ctx.quadraticCurveTo(bgX + bgW, bgY + bgH, bgX + bgW - r, bgY + bgH);
      ctx.lineTo(bgX + r, bgY + bgH);
      ctx.quadraticCurveTo(bgX, bgY + bgH, bgX, bgY + bgH - r);
      ctx.lineTo(bgX, bgY + r);
      ctx.quadraticCurveTo(bgX, bgY, bgX + r, bgY);
      ctx.closePath(); ctx.fill();
      // 绘制两行白色文本
      ctx.textBaseline = 'top'; ctx.fillStyle = '#ffffff';
      const textX = pad + pad;
      ctx.fillText(line1, textX, bgY + pad);
      ctx.fillText(line2, textX, bgY + pad + fs + lineGap);
      resolve(canvas.toDataURL('image/jpeg', 0.95));
    };
    img.onerror = () => reject(new Error('图片加载失败'));
    img.src = imageData;
  });
}

// ============================================================
// 五-B、缩略图生成与懒加载
// ============================================================

/** 生成缩略图：宽度 200px，等比缩放，JPEG 质量 0.8 */
function generateThumbnail(imageData, targetWidth = 200) {
  return new Promise((resolve) => {
    const img = new Image();
    img.onload = () => {
      const canvas = document.createElement('canvas');
      const scale = Math.min(targetWidth / img.naturalWidth, 1);
      canvas.width = Math.round(img.naturalWidth * scale);
      canvas.height = Math.round(img.naturalHeight * scale);
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
      resolve(canvas.toDataURL('image/jpeg', 0.8));
    };
    img.onerror = () => resolve(imageData);
    img.src = imageData;
  });
}

const thumbObserver = new IntersectionObserver((entries) => {
  entries.forEach(entry => {
    if (entry.isIntersecting) {
      const img = entry.target;
      if (img.dataset.thumbSrc) {
        img.src = img.dataset.thumbSrc;
        delete img.dataset.thumbSrc;
      }
      thumbObserver.unobserve(img);
    }
  });
}, { rootMargin: '300px' });

// 【优化】批量读取后生成缺失缩略图，避免逐条异步读取
async function generateMissingThumbnails(fid, aname, sidx) {
  const keys = [];
  for (let t = 0; t < TIME_SLOTS.length; t++) {
    keys.push(cellKey(fid, aname, sidx, t));
  }
  const cellDataMap = await getCellDataBatch(keys);
  for (let t = 0; t < TIME_SLOTS.length; t++) {
    const ck = cellKey(fid, aname, sidx, t);
    const cd = cellDataMap[ck];
    if (!cd || !cd.images) continue;
    let changed = false;
    for (let i = 0; i < cd.images.length; i++) {
      if (!cd.images[i].thumbnail && cd.images[i].data) {
        cd.images[i].thumbnail = await generateThumbnail(cd.images[i].data);
        changed = true;
      }
    }
    if (changed) await saveCellData(ck, cd.images);
  }
}

        try { await navigator.share({ files: [shareFile] }); } catch (err) { if (err.name !== 'AbortError') console.error('分享出错:', err); }
      } else { downloadBlob(shareBlob, shareName); }
    } else { downloadBlob(shareBlob, shareName); }
  } catch (err) {
    if (err.name === 'QuotaExceededError') showToast('存储空间不足！');
    else { console.error('拍照处理出错:', err); showToast('拍照处理出错'); }

  captureInput.value = '';
});

// 七、下载
// ============================================================
function dataURLtoBlob(dataurl) {
  const arr = dataurl.split(','), mime = arr[0].match(/:(.*?);/)[1], bstr = atob(arr[1]);
  const u8arr = new Uint8Array(bstr.length);
  for (let i = 0; i < bstr.length; i++) u8arr[i] = bstr.charCodeAt(i);
  return new Blob([u8arr], { type: mime });
}
function downloadBlob(blob, filename) {
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href = url; a.download = filename;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(url), 1000);
}

async function getProcessedData(imgObj, fid, aname, sidx) {
  let data = imgObj.data;
  if (imgObj.original) {
    const sName = getSeatNameSync(fid, aname, sidx);
    const bTime = imgObj.beijingTime || getBeijingTime();
    data = await addWatermark(imgObj.original, sName, bTime);
  }
  return data;
}

// 【优化】分享选中图片：一次性读取所有数据，避免逐条异步读取
async function shareSelectedImages() {
  if (state.selectedCells.length === 0) return;
  // 收集所有图片 blob 和文件名
  const allCells = await dbGetAll('cells');
  const cellMap = new Map();
  allCells.forEach(r => { if (r.images && r.images.length > 0) cellMap.set(r.key, r); });
  const items = [];
  for (const ck of state.selectedCells) {
    const cellData = cellMap.get(ck);
    if (!cellData || !cellData.images || cellData.images.length === 0) continue;
    const parts = ck.split('-'), fid = parseInt(parts[0]), aname = parts[1], sidx = parseInt(parts[2]), tidx = parseInt(parts[3]);
    const sName = getSeatNameSync(fid, aname, sidx), timeSlot = TIME_SLOTS[tidx];
    for (let i = 0; i < cellData.images.length; i++) {
      const data = await getProcessedData(cellData.images[i], fid, aname, sidx);
      const blob = dataURLtoBlob(data);
      const filename = `${sName}_${timeSlot}_${i + 1}.jpg`;
      items.push({ blob, filename });
    }
  }
  if (items.length === 0) { showToast('无图片可分享'); return; }

  // 优先使用系统分享
  if (navigator.share && navigator.canShare) {
    const files = items.map(it => new File([it.blob], it.filename, { type: 'image/jpeg' }));
    if (navigator.canShare({ files })) {
      try { await navigator.share({ files }); return; }
      catch (err) { if (err.name === 'AbortError') return; }
    }
  }

  // 回退：单张直接下载，多张打包 zip
  if (items.length === 1) {
    downloadBlob(items[0].blob, items[0].filename);
    showToast('已开始下载');
  } else {
    showToast('正在打包...');
    try {
      const zip = new JSZip();
      items.forEach(it => zip.file(it.filename, it.blob));
      const zipBlob = await zip.generateAsync({ type: 'blob' });
      downloadBlob(zipBlob, `图片导出_${Date.now()}.zip`);
      showToast(`已下载 ${items.length} 张图片`);
    } catch (err) { console.error('打包出错:', err); showToast('打包出错'); }
  }
}

// 【优化】拼接下载：一次性读取所有数据，避免逐条异步读取
async function downloadConcatenated() {
  if (state.selectedCells.length === 0) return;
  // 拼接功能最多选择 2 个时段
  const uniqueTimeSlots = new Set(state.selectedCells.map(ck => ck.split('-')[3]));
  if (uniqueTimeSlots.size > 2) { showToast('拼接功能只能选择 2 个时段'); return; }
  const allCells = await dbGetAll('cells');
  const cellMap = new Map();
  allCells.forEach(r => cellMap.set(r.key, r));
  const allImageData = [];
  for (const ck of state.selectedCells) {
    const cellData = cellMap.get(ck);
    if (!cellData || !cellData.images || cellData.images.length === 0) continue;
    const parts = ck.split('-'), fid = parseInt(parts[0]), aname = parts[1], sidx = parseInt(parts[2]);
    for (const imgObj of cellData.images) allImageData.push({ ...imgObj, fid, aname, sidx });
  }
  if (allImageData.length === 0) { showToast('无图片可拼接'); return; }
  const processedImages = [];
  for (const imgObj of allImageData) {
    processedImages.push(await getProcessedData(imgObj, imgObj.fid, imgObj.aname, imgObj.sidx));
  }
  const imgs = await Promise.all(processedImages.map(src => new Promise((r, j) => { const img = new Image(); img.onload = () => r(img); img.onerror = () => j(); img.src = src; })));
  const maxW = Math.max(...imgs.map(i => i.naturalWidth));
  const scaledH = imgs.map(i => Math.round(i.naturalHeight * maxW / i.naturalWidth));
  const totalH = scaledH.reduce((a, b) => a + b, 0);
  const canvas = document.createElement('canvas'); canvas.width = maxW; canvas.height = totalH;
  const ctx = canvas.getContext('2d'); ctx.fillStyle = '#fff'; ctx.fillRect(0, 0, maxW, totalH);
  let y = 0;
  for (let i = 0; i < imgs.length; i++) { ctx.drawImage(imgs[i], 0, y, maxW, scaledH[i]); y += scaledH[i]; }
  canvas.toBlob(blob => { downloadBlob(blob, `拼接结果_${Date.now()}.jpg`); showToast('拼接下载完成'); }, 'image/jpeg', 0.95);
}

// ============================================================
// 九、全屏预览（横向滚动 + scroll-snap）
// ============================================================
const previewModal = document.getElementById('preview-modal');
const previewScroller = document.getElementById('preview-scroller');
const previewClose = document.getElementById('preview-close');
const previewIndicator = document.getElementById('preview-indicator');
const previewSaveBtn = document.getElementById('preview-save-btn');
let pvImages = [], pvIndex = 0;
let pvScale = 1, pvTX = 0, pvTY = 0, pvLastDist = 0, pvLastX = 0, pvLastY = 0;
let pvPinching = false, pvSwipingDown = false;
let pvSwipeStartX = 0, pvSwipeStartY = 0;
const pvCache = new Map();
// 【优化】RAF 节流标志，避免 pinch 缩放时过于频繁更新 DOM
let pvRafPending = false;

/** 获取当前可见的 slide 和 img 元素 */
function pvCurrentSlide() {
  return previewScroller.children[pvIndex] || null;
}
function pvCurrentImg() {
  const slide = pvCurrentSlide();
  return slide ? slide.querySelector('img') : null;
}

/** 对当前图片应用变换 */
function pvApply() {
  const img = pvCurrentImg();
  if (img) img.style.transform = `translate(${pvTX}px, ${pvTY}px) scale(${pvScale})`;
}
function pvReset() {
  pvScale = 1; pvTX = 0; pvTY = 0; pvApply();
}

/** 更新指示器文字 */
function pvUpdateIndicator() {
  previewIndicator.textContent = pvImages.length > 1 ? `${pvIndex + 1} / ${pvImages.length}` : '';
}

// 【优化】预览懒加载：加载指定索引的完整水印图片
async function pvLoadFullImage(idx) {
  if (idx < 0 || idx >= pvImages.length) return;
  const slide = previewScroller.children[idx];
  if (!slide || slide.dataset.loaded === '1') return;
  const imgEl = slide.querySelector('img');
  if (!imgEl) return;

  let data = pvImages[idx].data;
  const cacheKey = `${pvImages[idx]._cellKey}_${idx}`;
  if (pvCache.has(cacheKey)) {
    data = pvCache.get(cacheKey);
  } else if (pvImages[idx].original) {
    const ck = pvImages[idx]._cellKey;
    if (ck) {
      const parts = ck.split('-');
      const sName = getSeatNameSync(parseInt(parts[0]), parts[1], parseInt(parts[2]));
      const bTime = pvImages[idx].beijingTime || getBeijingTime();
      data = await addWatermark(pvImages[idx].original, sName, bTime);
      pvCache.set(cacheKey, data);
    }
  }
  imgEl.src = data;
  slide.dataset.loaded = '1';
}

/** 根据滚动位置更新 pvIndex */
function pvSyncIndex() {
  const sl = previewScroller.scrollLeft;
  const w = previewScroller.clientWidth;
  if (w <= 0) return;
  const newIdx = Math.round(sl / w);
  if (newIdx !== pvIndex && newIdx >= 0 && newIdx < pvImages.length) {
    // 【修复】重置所有非当前 slide 的变换，避免切换后残留缩放/偏移
    const prevIdx = pvIndex;
    pvIndex = newIdx;
    // 重置前一个 slide 的变换
    if (prevIdx >= 0 && prevIdx < previewScroller.children.length) {
      const prevSlide = previewScroller.children[prevIdx];
      const prevImg = prevSlide ? prevSlide.querySelector('img') : null;
      if (prevImg) {
        prevImg.style.transform = 'translate(0px, 0px) scale(1)';
        prevImg.style.transition = 'none';
        prevImg.style.opacity = '1';
      }
    }
    pvReset();
    pvUpdateIndicator();
    // 【优化】预加载相邻图片
    pvLoadFullImage(newIdx - 1);
    pvLoadFullImage(newIdx + 1);
  }
}

async function showPreview(cellKeyStr, imgIdx) {
  const cellData = await getCellData(cellKeyStr);
  if (!cellData || !cellData.images || !cellData.images[imgIdx]) return;
  pvImages = cellData.images.map((img, i) => ({ ...img, _cellKey: cellKeyStr }));
  pvIndex = imgIdx;

  // 【优化】构建 DOM：仅加载当前及相邻 slide 的完整水印图，其余用缩略图
  previewScroller.innerHTML = '';
  for (let i = 0; i < pvImages.length; i++) {
    const slide = document.createElement('div');
    slide.className = 'pv-slide';
    slide.dataset.pvIdx = i;
    const imgEl = document.createElement('img');

    if (Math.abs(i - pvIndex) <= 1) {
      // 加载完整水印图
      let data = pvImages[i].data;
      const cacheKey = `${pvImages[i]._cellKey}_${i}`;
      if (pvCache.has(cacheKey)) {
        data = pvCache.get(cacheKey);
      } else if (pvImages[i].original) {
        const ck = pvImages[i]._cellKey;
        if (ck) {
          const parts = ck.split('-');
          const sName = getSeatNameSync(parseInt(parts[0]), parts[1], parseInt(parts[2]));
          const bTime = pvImages[i].beijingTime || getBeijingTime();
          data = await addWatermark(pvImages[i].original, sName, bTime);
          pvCache.set(cacheKey, data);
        }
      }
      imgEl.src = data;
      slide.dataset.loaded = '1';
    } else {
      // 非相邻 slide 使用缩略图
      imgEl.src = pvImages[i].thumbnail || pvImages[i].thumb || pvImages[i].data;
      slide.dataset.loaded = '0';
    }

    slide.appendChild(imgEl);
    previewScroller.appendChild(slide);
  }

  // 先禁用 smooth，跳转到目标位置
  previewScroller.style.scrollBehavior = 'auto';
  previewScroller.classList.remove('pv-no-scroll');
  pvScale = 1; pvTX = 0; pvTY = 0;

  previewModal.classList.add('show');

  // 等待布局完成后滚动
  requestAnimationFrame(() => {
    const w = previewScroller.clientWidth;
    previewScroller.scrollLeft = pvIndex * w;
    // 恢复 smooth 滚动
    requestAnimationFrame(() => { previewScroller.style.scrollBehavior = 'smooth'; });
  });

  pvUpdateIndicator();
}

function closePreview() {
  previewModal.classList.remove('show');
  previewScroller.innerHTML = '';
  pvImages = [];
  pvCache.clear();
  pvScale = 1; pvTX = 0; pvTY = 0;
  previewScroller.classList.remove('pv-no-scroll');
}

previewClose.addEventListener('click', closePreview);
previewScroller.addEventListener('contextmenu', (e) => e.preventDefault());

// 滚动时同步索引
previewScroller.addEventListener('scroll', () => { pvSyncIndex(); }, { passive: true });

// ---- 触摸手势 ----
previewScroller.addEventListener('touchstart', (e) => {
  if (e.touches.length === 2) {
    e.preventDefault();
    pvPinching = true; pvSwipingDown = false;
    const dx = e.touches[0].clientX - e.touches[1].clientX, dy = e.touches[0].clientY - e.touches[1].clientY;
    pvLastDist = Math.sqrt(dx * dx + dy * dy);
    // 缩放时禁用容器滚动
    previewScroller.classList.add('pv-no-scroll');
  } else if (e.touches.length === 1) {
    pvSwipingDown = false;
    pvSwipeStartX = e.touches[0].clientX;
    pvSwipeStartY = e.touches[0].clientY;
    pvLastX = e.touches[0].clientX;
    pvLastY = e.touches[0].clientY;
  }
}, { passive: false });

previewScroller.addEventListener('touchmove', (e) => {
  if (pvPinching && e.touches.length === 2) {
    e.preventDefault();
    const dx = e.touches[0].clientX - e.touches[1].clientX, dy = e.touches[0].clientY - e.touches[1].clientY;
    const dist = Math.sqrt(dx * dx + dy * dy);
    if (pvLastDist > 0) {
      const ratio = dist / pvLastDist, newScale = Math.max(0.5, Math.min(5, pvScale * ratio));
      const midX = (e.touches[0].clientX + e.touches[1].clientX) / 2, midY = (e.touches[0].clientY + e.touches[1].clientY) / 2;
      pvTX = midX - (midX - pvTX) * (newScale / pvScale); pvTY = midY - (midY - pvTY) * (newScale / pvScale);
      pvScale = newScale;
      // 【优化】使用 RAF 节流变换更新，减少 DOM 操作频率
      if (!pvRafPending) {
        pvRafPending = true;
        requestAnimationFrame(() => { pvApply(); pvRafPending = false; });
      }
    }
    pvLastDist = dist;
  } else if (e.touches.length === 1 && !pvPinching) {
    const curX = e.touches[0].clientX, curY = e.touches[0].clientY;
    const dx = curX - pvSwipeStartX, dy = curY - pvSwipeStartY;
    // 下滑关闭（未缩放时）
    if (pvScale <= 1.05 && Math.abs(dy) > Math.abs(dx) && dy > 0 && !pvSwipingDown && Math.abs(dy) > 10) {
      pvSwipingDown = true;
      previewScroller.classList.add('pv-no-scroll');
    }
    if (pvSwipingDown) {
      e.preventDefault();
      const img = pvCurrentImg();
      if (img) {
        img.style.transform = `translate(0, ${dy}px) scale(1)`;
        img.style.transition = 'none';
        img.style.opacity = Math.max(0.3, 1 - dy / 400);
      }
    }
    pvLastX = curX; pvLastY = curY;
  }
}, { passive: false });

// 【修复】合并两个 touchend 监听器为一个，避免事件处理冲突
let pvLastTapTime = 0, pvLastTapX = 0, pvLastTapY = 0;
previewScroller.addEventListener('touchend', (e) => {
  // Pinch end
  if (pvPinching && e.touches.length < 2) {
    pvPinching = false; pvLastDist = 0;
    // 缩放结束，如果恢复到1则允许滚动
    if (pvScale <= 1.05) {
      previewScroller.classList.remove('pv-no-scroll');
    }
  }

  if (e.touches.length === 0) {
    // 下滑关闭判断
    if (pvSwipingDown) {
      const dy = pvLastY - pvSwipeStartY;
      if (dy > 80) {
        closePreview();
      } else {
        // 回弹
        const img = pvCurrentImg();
        if (img) {
          img.style.transition = 'transform .3s ease, opacity .3s ease';
          img.style.opacity = '1';
        }
        pvReset();
        previewScroller.classList.remove('pv-no-scroll');
      }
      pvSwipingDown = false;
      return;
    }

    // 双击缩放/还原
    if (!pvPinching && !pvSwipingDown) {
      const now = Date.now();
      const touch = e.changedTouches[0];
      if (touch) {
        const tx = touch.clientX, ty = touch.clientY;
        if (now - pvLastTapTime < 300 && Math.abs(tx - pvLastTapX) < 30 && Math.abs(ty - pvLastTapY) < 30) {
          e.preventDefault();
          if (pvScale > 1.05) {
            pvScale = 1; pvTX = 0; pvTY = 0; pvApply();
            previewScroller.classList.remove('pv-no-scroll');
          } else {
            const rect = previewScroller.getBoundingClientRect();
            const cx = tx - rect.left, cy = ty - rect.top;
            const newScale = 2.5;
            pvTX = cx - (cx - pvTX) * (newScale / pvScale);
            pvTY = cy - (cy - pvTY) * (newScale / pvScale);
            pvScale = newScale; pvApply();
            previewScroller.classList.add('pv-no-scroll');
          }
          pvLastTapTime = 0;
        } else {
          pvLastTapTime = now; pvLastTapX = tx; pvLastTapY = ty;
        }
      }
    }
  }
});

previewScroller.addEventListener('wheel', (e) => {
  e.preventDefault();
  const factor = e.deltaY > 0 ? 0.9 : 1.1, newScale = Math.max(0.5, Math.min(5, pvScale * factor));
  const rect = previewScroller.getBoundingClientRect(), mx = e.clientX - rect.left, my = e.clientY - rect.top;
  pvTX = mx - (mx - pvTX) * (newScale / pvScale); pvTY = my - (my - pvTY) * (newScale / pvScale);
  pvScale = newScale; pvApply();
  if (pvScale > 1.05) previewScroller.classList.add('pv-no-scroll');
  else previewScroller.classList.remove('pv-no-scroll');
}, { passive: false });

const cleanupModal = document.getElementById('cleanup-modal');
const pickerYear = document.getElementById('picker-year');
const pickerMonth = document.getElementById('picker-month');
const pickerDay = document.getElementById('picker-day');
let cleanupYear = 2026, cleanupMonth = 6, cleanupDay = 10;

function fillPickerCol(colEl, items, selectedVal) {
  const label = colEl.querySelector('.picker-col-label'), pad = colEl.querySelector('.picker-pad');
  colEl.innerHTML = ''; colEl.appendChild(label); colEl.appendChild(pad);
  items.forEach(val => { const div = document.createElement('div'); div.className = 'picker-item' + (val === selectedVal ? ' active' : ''); div.textContent = val; div.dataset.val = val; colEl.appendChild(div); });
  const padB = document.createElement('div'); padB.className = 'picker-pad'; colEl.appendChild(padB);
  requestAnimationFrame(() => { const a = colEl.querySelector('.picker-item.active'); if (a) a.scrollIntoView({ block: 'center', behavior: 'auto' }); });
}
function readPickerCol(colEl) { const items = colEl.querySelectorAll('.picker-item'), st = colEl.scrollTop, ch = colEl.clientHeight, center = st + ch / 2; let closest = null, minDist = Infinity; items.forEach(item => { const mid = item.offsetTop + item.offsetHeight / 2, dist = Math.abs(mid - center); if (dist < minDist) { minDist = dist; closest = item; } }); return closest ? parseInt(closest.dataset.val) : null; }
function highlightPickerCol(colEl) { const val = readPickerCol(colEl); colEl.querySelectorAll('.picker-item').forEach(item => item.classList.toggle('active', parseInt(item.dataset.val) === val)); return val; }
function getDaysInMonth(y, m) { return new Date(y, m, 0).getDate(); }
function updateDayPicker() { const y = readPickerCol(pickerYear) || cleanupYear, m = readPickerCol(pickerMonth) || cleanupMonth; const maxDay = getDaysInMonth(y, m), days = []; for (let dd = 1; dd <= maxDay; dd++) days.push(dd); fillPickerCol(pickerDay, days, Math.min(readPickerCol(pickerDay) || cleanupDay, maxDay)); }
function initCleanupDate() { const d = new Date(); cleanupYear = d.getFullYear(); cleanupMonth = d.getMonth() + 1; cleanupDay = d.getDate(); const years = []; for (let y = d.getFullYear() + 1; y >= d.getFullYear() - 5; y--) years.push(y); fillPickerCol(pickerYear, years, cleanupYear); const months = []; for (let m = 1; m <= 12; m++) months.push(m); fillPickerCol(pickerMonth, months, cleanupMonth); const maxDay = getDaysInMonth(cleanupYear, cleanupMonth), days = []; for (let dd = 1; dd <= maxDay; dd++) days.push(dd); fillPickerCol(pickerDay, days, cleanupDay); }
let pickerScrollTimer = null;
[pickerYear, pickerMonth, pickerDay].forEach(col => {
  col.addEventListener('scroll', () => { highlightPickerCol(col); if (col === pickerYear || col === pickerMonth) { clearTimeout(pickerScrollTimer); pickerScrollTimer = setTimeout(updateDayPicker, 200); } }, { passive: true });
  col.addEventListener('click', (e) => { const item = e.target.closest('.picker-item'); if (item) { item.scrollIntoView({ block: 'center', behavior: 'smooth' }); if (col === pickerYear || col === pickerMonth) setTimeout(updateDayPicker, 300); } });
});
document.getElementById('cleanup-cancel-btn').addEventListener('click', () => cleanupModal.classList.remove('show'));
document.getElementById('cleanup-exec-btn').addEventListener('click', async () => {
  cleanupYear = readPickerCol(pickerYear) || cleanupYear; cleanupMonth = readPickerCol(pickerMonth) || cleanupMonth; cleanupDay = readPickerCol(pickerDay) || cleanupDay;
  const dateVal = `${cleanupYear}-${String(cleanupMonth).padStart(2, '0')}-${String(cleanupDay).padStart(2, '0')}`;
  const threshold = new Date(dateVal + 'T00:00:00+08:00').getTime();
  if (isNaN(threshold)) { showToast('日期无效'); return; }
  cleanupModal.classList.remove('show'); showToast('正在清理...');
  try { const all = await dbGetAll('cells'); let total = 0; for (const rec of all) { if (!rec.images) continue; const filtered = rec.images.filter(img => (img.createdAt || 0) >= threshold); if (filtered.length < rec.images.length) { total += rec.images.length - filtered.length; if (filtered.length > 0) await saveCellData(rec.key, filtered); else await dbDelete('cells', rec.key); } } await buildSeatHasImages(); renderMain(); showToast(`已清理 ${total} 张图片`); } catch (err) { console.error('清理出错:', err); showToast('清理出错'); }
});

app.addEventListener('click', async (e) => {

  }
  const delSeatBtn = target.closest('[data-action="delete-seat"]');
  if (delSeatBtn) {
    const sk = delSeatBtn.dataset.seatKey;
    if (!confirm('确定删除该座位及其所有图片？')) return;
    const parts = sk.split('-'), fid = parseInt(parts[0]), aname = parts[1], sidx = parseInt(parts[2]);
    for (let t = 0; t < TIME_SLOTS.length; t++) await dbDelete('cells', cellKey(fid, aname, sidx, t));
    await dbDelete('seatNames', sk); delete state.seatNames[sk];
    state.deletedSeats.add(sk); await saveDeletedSeat(sk);
    state.seatHasImages.delete(sk); state.expandedSeats.delete(sk);
    state.selectedCells = state.selectedCells.filter(ck => cellToSeatKey(ck) !== sk);
    updateBottomBar(); saveUIState(); renderMain(); showToast('座位已删除'); return;
  }
  const checkbox = target.closest('[data-action="toggle-select"]');
  if (checkbox) { if (checkbox.classList.contains('disabled')) return; const ck = checkbox.dataset.cellKey, idx = state.selectedCells.indexOf(ck); if (idx >= 0) { state.selectedCells.splice(idx, 1); checkbox.classList.remove('checked'); } else { state.selectedCells.push(ck); checkbox.classList.add('checked'); } updateBottomBar(); return; }
  const captureBtn = target.closest('[data-action="capture"]');
  if (captureBtn) { const ck = captureBtn.dataset.cellKey, cd = await getCellData(ck); if (cd && cd.images && cd.images.length >= MAX_IMAGES) { showToast('该时段图片已满'); return; } currentCaptureCellKey = ck; captureInput.value = ''; captureInput.click(); return; }
  const uploadBtn = target.closest('[data-action="upload"]');
  if (uploadBtn) { const ck = uploadBtn.dataset.cellKey, cd = await getCellData(ck); if (cd && cd.images && cd.images.length >= MAX_IMAGES) { showToast('该时段图片已满'); return; } currentUploadCellKey = ck; uploadInput.value = ''; uploadInput.click(); return; }
  const delBtn = target.closest('[data-action="delete-img"]');
  // 【优化】删除图片后，若该时段仍有图片则无需扫描其他时段
  if (delBtn) { const ck = delBtn.dataset.cellKey, imgIdx = parseInt(delBtn.dataset.imgIdx), cd = await getCellData(ck); let imgs = (cd && cd.images) ? [...cd.images] : []; if (imgIdx >= 0 && imgIdx < imgs.length) { imgs.splice(imgIdx, 1); const sk = cellToSeatKey(ck); if (imgs.length > 0) { await saveCellData(ck, imgs); state.seatHasImages.add(sk); } else { await dbDelete('cells', ck); const p = ck.split('-'); let still = false; for (let t = 0; t < TIME_SLOTS.length; t++) { const td = await getCellData(`${p[0]}-${p[1]}-${p[2]}-${t}`); if (td && td.images && td.images.length > 0) { still = true; break; } } still ? state.seatHasImages.add(sk) : state.seatHasImages.delete(sk); } updateSeatVisual(sk); await renderTimeSlots(sk); updateBottomBar(); } return; }
  const previewBtn = target.closest('[data-action="preview"]');
  if (previewBtn) { showPreview(previewBtn.dataset.cellKey, parseInt(previewBtn.dataset.imgIdx)); return; }
  // 点击时段卡片空白区域切换勾选
  const card = target.closest('[data-action="toggle-card"]');
  if (card) { if (card.dataset.hasImages !== '1') return; const ck = card.dataset.cellKey, cb = card.querySelector('.ts-checkbox'); if (!cb || cb.classList.contains('disabled')) return; const idx = state.selectedCells.indexOf(ck); if (idx >= 0) { state.selectedCells.splice(idx, 1); cb.classList.remove('checked'); } else { state.selectedCells.push(ck); cb.classList.add('checked'); } updateBottomBar(); return; }
  const nameEl = target.closest('[data-action="edit-seat-name"]');
  if (nameEl) { const sk = nameEl.dataset.seatKey, curName = nameEl.textContent; const input = document.createElement('input'); input.type = 'text'; input.value = curName; input.className = 'seat-name-edit-input'; const doSave = async () => { const newName = input.value.trim() || curName; if (newName === curName) { const sp = document.createElement('span'); sp.className = 'seat-name-text'; sp.dataset.action = 'edit-seat-name'; sp.dataset.seatKey = sk; sp.textContent = newName; if (input.parentNode) input.replaceWith(sp); return; } state.seatNames[sk] = newName; await saveSeatName(sk, newName); const sp = document.createElement('span'); sp.className = 'seat-name-text'; sp.dataset.action = 'edit-seat-name'; sp.dataset.seatKey = sk; sp.textContent = newName; if (input.parentNode) input.replaceWith(sp); updateSeatButtonText(sk, newName); await regenerateWatermarksForSeat(sk); }; input.addEventListener('blur', doSave); input.addEventListener('keydown', (ev) => { if (ev.key === 'Enter') input.blur(); }); nameEl.replaceWith(input); input.focus(); input.select(); return; }

// ============================================================
// 十二-B、时段筛选面板
// ============================================================
const filterOverlay = document.getElementById('filter-overlay');
const filterSheet = document.getElementById('filter-sheet');
const filterBody = document.getElementById('filter-body');

/** 打开筛选面板 */
function openFilterSheet() {
  renderFilterBody();
  filterOverlay.classList.add('show');
  requestAnimationFrame(() => filterSheet.classList.add('show'));
}

/** 关闭筛选面板 */
function closeFilterSheet() {
  filterSheet.classList.remove('show');
  setTimeout(() => filterOverlay.classList.remove('show'), 300);
}

/** 渲染筛选面板内容 */
function renderFilterBody() {
  let html = '';
  TIME_SLOTS.forEach((ts, idx) => {
    const checked = isTimeSlotVisible(idx);
    const passed = isTimeSlotPassed(idx);
    html += `<div class="filter-slot-item" data-tidx="${idx}"><div class="filter-slot-cb ${checked ? 'checked' : ''}"></div><span class="filter-slot-label ${passed ? 'passed' : ''}">${ts}${passed ? ' (已过)' : ''}</span></div>`;
  });
  filterBody.innerHTML = html;
}

/** 切换单个时段勾选 */
filterBody.addEventListener('click', (e) => {
  const item = e.target.closest('.filter-slot-item');
  if (!item) return;
  const tidx = parseInt(item.dataset.tidx);
  const cb = item.querySelector('.filter-slot-cb');
  // 如果当前是全显状态（空集+_filterNone=false），先初始化为全部勾选
  if (state.visibleTimeSlots.size === 0 && !state._filterNone) {
    state.visibleTimeSlots = new Set(TIME_SLOTS.map((_, i) => i));
  }
  state._filterNone = false;
  if (state.visibleTimeSlots.has(tidx)) {
    state.visibleTimeSlots.delete(tidx);
    cb.classList.remove('checked');
  } else {
    state.visibleTimeSlots.add(tidx);
    cb.classList.add('checked');
  }
  // 如果全部勾选，等价于无筛选
  if (state.visibleTimeSlots.size === TIME_SLOTS.length) {
    state.visibleTimeSlots = new Set();
    state._filterNone = false;
  }
  saveFilterState();
  refreshExpandedSeats();
});

/** 隐藏已过时段 */
document.getElementById('filter-hide-passed').addEventListener('click', () => {
  state.visibleTimeSlots = new Set();
  state._filterNone = false;
  for (let i = 0; i < TIME_SLOTS.length; i++) {
    if (!isTimeSlotPassed(i)) state.visibleTimeSlots.add(i);
  }
  // 如果所有时段都已过（如 21:00 之后），至少保留最后一个时段
  if (state.visibleTimeSlots.size === 0) {
    state.visibleTimeSlots.add(TIME_SLOTS.length - 1);
  }
  saveFilterState();
  renderFilterBody();
  refreshExpandedSeats();
});

/** 全选 */
document.getElementById('filter-select-all').addEventListener('click', () => {
  state.visibleTimeSlots = new Set(); // 空集+_filterNone=false = 全部显示
  state._filterNone = false;
  saveFilterState();
  renderFilterBody();
  refreshExpandedSeats();
});

/** 清除所有勾选 */
document.getElementById('filter-clear').addEventListener('click', () => {
  state.visibleTimeSlots = new Set();
  state._filterNone = true; // 空集+_filterNone=true = 全不显示
  saveFilterState();
  renderFilterBody();
  refreshExpandedSeats();
});

/** 关闭面板 */
filterOverlay.addEventListener('click', closeFilterSheet);
document.getElementById('filter-close').addEventListener('click', closeFilterSheet);

/** 筛选变更后刷新已展开的座位 */
function refreshExpandedSeats() {
  state.expandedSeats.forEach(sk => renderTimeSlots(sk));
}

function updateSeatButtonText(sk, newName) {
  document.querySelectorAll('.seat-btn').forEach(btn => { const k = seatKey(parseInt(btn.dataset.floor), btn.dataset.area, parseInt(btn.dataset.seat)); if (k === sk) btn.textContent = newName; });
}
async function regenerateWatermarksForSeat(sk) {
  const parts = sk.split('-'), fid = parseInt(parts[0]), aname = parts[1], sidx = parseInt(parts[2]);
  const sName = getSeatNameSync(fid, aname, sidx);
  for (let t = 0; t < TIME_SLOTS.length; t++) {
    const ck = cellKey(fid, aname, sidx, t), cd = await getCellData(ck);
    if (!cd || !cd.images) continue;
    let changed = false;
    for (let i = 0; i < cd.images.length; i++) {
      if (cd.images[i].original) {
        const bTime = cd.images[i].beijingTime || getBeijingTime();
        cd.images[i].data = await addWatermark(cd.images[i].original, sName, bTime);
        cd.images[i].thumbnail = await generateThumbnail(cd.images[i].data);
        cd.images[i].seatName = sName;
        changed = true;
      }
    }
    if (changed) await saveCellData(ck, cd.images);
  }
  await renderTimeSlots(sk);
}

// ============================================================
// 十三、初始化
// ============================================================
async function init() {
  try {
    await openDB();
    state.seatNames = await getAllSeatNames();
    state.extraSeats = await getAllExtraSeats();
    state.deletedSeats = await getAllDeletedSeats();
    await buildSeatHasImages();
    loadUIState();
    loadFilterState();
    renderMain();
  } catch (err) {
    console.error('初始化失败:', err);
    app.innerHTML = '<p style="padding:20px;color:red;">初始化失败，请检查浏览器是否支持 IndexedDB。</p>';
  }
  // 注册 Service Worker
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js').catch(() => {});
  }
  // 动态生成 apple-touch-icon（iOS 主屏幕图标）
  try {
    const c = document.createElement('canvas'); c.width = 192; c.height = 192;
    const ctx = c.getContext('2d');
    ctx.fillStyle = '#1890ff'; ctx.fillRect(0, 0, 192, 192);
    ctx.fillStyle = '#fff'; ctx.font = 'bold 96px sans-serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText('座', 96, 96);
    const link = document.createElement('link');
    link.rel = 'apple-touch-icon'; link.href = c.toDataURL('image/png');
    document.head.appendChild(link);
  } catch (e) {}
}
init();
