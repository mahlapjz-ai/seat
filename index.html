<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<link rel="manifest" href="manifest.json?v=2">
<link rel="icon" type="image/png" sizes="512x512" href="seat-icon.png?v=2">
<link rel="apple-touch-icon" sizes="512x512" href="seat-icon.png?v=2">
<meta name="theme-color" content="#1890ff">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="座位管理">
<title>图书馆座位分时段图片管理</title>
<script src="https://cdn.jsdelivr.net/npm/jszip@3/dist/jszip.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;font-size:15px;color:#333;background:#f0f2f5;-webkit-tap-highlight-color:transparent}
#app{max-width:480px;margin:0 auto;padding:12px 10px 100px;min-height:100vh}

.page-header{display:flex;align-items:center;justify-content:center;padding:14px 0 10px;gap:8px;flex-wrap:wrap}
.page-title{font-size:20px;font-weight:700;color:#1a1a1a;letter-spacing:1px}
.header-btn{padding:6px 12px;font-size:12px;font-weight:600;border:none;border-radius:6px;color:#fff;cursor:pointer;white-space:nowrap}
.header-btn:active{opacity:.7}
.btn-cleanup{background:#ff4d4f}
.btn-batch-dl{background:#722ed1}

/* 【修改1】删除座位按钮受开关控制 */
.btn-delete-seat{padding:4px 12px;font-size:12px;font-weight:600;border:1px solid #ff4d4f;border-radius:4px;background:#fff;color:#ff4d4f;cursor:pointer;margin-left:auto;display:none}
.btn-delete-seat.visible{display:inline-block}
.btn-delete-seat:active{background:#fff1f0}

/* 【修改3】功能面板 */
.func-panel-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.45);z-index:260}
.func-panel-overlay.show{display:block}
.func-panel{position:fixed;left:0;right:0;bottom:0;background:#fff;border-radius:16px 16px 0 0;z-index:261;transform:translateY(100%);transition:transform .3s ease;max-width:480px;margin:0 auto;padding-bottom:env(safe-area-inset-bottom)}
.func-panel.show{transform:translateY(0)}
.func-panel-header{display:flex;align-items:center;justify-content:space-between;padding:16px 20px 12px;border-bottom:1px solid #f0f0f0}
.func-panel-title{font-size:17px;font-weight:700;color:#1a1a1a}
.func-panel-close{width:36px;height:36px;border:none;background:#f5f5f5;border-radius:50%;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#999;min-width:44px;min-height:44px}
.func-panel-close:active{background:#e8e8e8}
.func-panel-body{padding:8px 20px 24px}
.func-item{display:flex;align-items:center;justify-content:space-between;padding:14px 0;min-height:48px;border-bottom:1px solid #f5f5f5;cursor:pointer;-webkit-tap-highlight-color:transparent}
.func-item:last-child{border-bottom:none}
.func-item:active{background:#fafafa;border-radius:8px}
.func-item-label{font-size:15px;color:#333;font-weight:500}
.func-item-label .func-item-desc{font-size:12px;color:#999;font-weight:400;margin-top:2px}
/* 开关样式 */
.func-toggle{width:48px;height:28px;border-radius:14px;background:#bfbfbf;position:relative;cursor:pointer;transition:background .2s;flex-shrink:0}
.func-toggle.on{background:#52c41a}
.func-toggle::after{content:'';position:absolute;top:2px;left:2px;width:24px;height:24px;border-radius:50%;background:#fff;box-shadow:0 1px 3px rgba(0,0,0,.2);transition:transform .2s}
.func-toggle.on::after{transform:translateX(20px)}

/* 【修改4】预览保存按钮淡出 */
#preview-save-btn{position:absolute;bottom:50px;left:50%;transform:translateX(-50%);padding:10px 28px;font-size:14px;font-weight:600;border:none;border-radius:8px;background:rgba(24,144,255,.9);color:#fff;cursor:pointer;z-index:202;box-shadow:0 2px 12px rgba(24,144,255,.4);transition:opacity .5s ease}
#preview-save-btn:active{opacity:.8}
#preview-save-btn.faded{opacity:.1}

.floor-btn{display:block;width:100%;padding:16px 20px;margin:8px 0;font-size:18px;font-weight:600;border:none;border-radius:10px;color:#fff;cursor:pointer;text-align:left;transition:transform .1s}
.floor-btn:active{transform:scale(.97)}
.floor-btn .arrow{float:right;font-size:14px;transition:transform .25s;display:inline-block}
.floor-btn.expanded .arrow{transform:rotate(90deg)}
.floor-btn .floor-count{float:right;font-size:13px;font-weight:400;margin-right:8px;opacity:.85}
.floor-1{background:linear-gradient(135deg,#667eea,#764ba2)}
.floor-2{background:linear-gradient(135deg,#f093fb,#f5576c)}
.floor-3{background:linear-gradient(135deg,#4facfe,#00f2fe)}
.floor-4{background:linear-gradient(135deg,#43e97b,#38f9d7)}
.floor-5{background:linear-gradient(135deg,#fa709a,#fee140)}

.area-container{display:none;padding:4px 0 8px 16px}
.area-container.show{display:block}
.area-btn{display:inline-flex;flex-direction:column;align-items:center;padding:12px 20px;margin:5px 4px;font-size:16px;font-weight:600;border:none;border-radius:8px;background:#fff;color:#333;cursor:pointer;box-shadow:0 1px 4px rgba(0,0,0,.12);transition:transform .1s}
.area-btn:active{transform:scale(.95)}
.area-btn .arrow{margin-left:6px;font-size:12px;transition:transform .25s;display:inline-block}
.area-btn .area-count{font-size:11px;font-weight:400;color:#999;margin-top:2px}
.area-btn.expanded .arrow{transform:rotate(90deg)}
.area-btn.expanded{background:#e6f7ff;box-shadow:0 2px 8px rgba(24,144,255,.2)}
.area-btn.has-images{border:2px solid #52c41a;background:linear-gradient(135deg,#f6ffed,#d9f7be);color:#389e0d}
.area-btn.has-images.expanded{border-color:#1890ff;background:#e6f7ff;color:#333}

.seat-container{display:none;padding:8px 0}
.seat-container.show{display:block}
.seat-flow{display:flex;flex-wrap:wrap;gap:6px;padding:0 2px}
.seat-btn{width:calc(20% - 5px);padding:10px 2px;font-size:13px;font-weight:500;border:2px solid #d9d9d9;border-radius:6px;background:#fff;cursor:pointer;text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;transition:background .15s,border-color .15s;position:relative}
.seat-btn:active{background:#e6f7ff}
.seat-btn.expanded{background:#e6f7ff;border-color:#1890ff}
/* 【修改2】座位视觉提示分层：1个时段有图=浅蓝，2+时段=橙色 */
.seat-btn.has-images-1{border-color:#69c0ff;background:linear-gradient(135deg,#e6f7ff,#bae7ff);color:#096dd9;font-weight:700}
.seat-btn.has-images-2{border-color:#fa8c16;background:linear-gradient(135deg,#fff7e6,#ffe7ba);color:#d46b08;font-weight:700}
.seat-btn.has-images-1.expanded,.seat-btn.has-images-2.expanded{border-color:#1890ff;background:#e6f7ff;color:#333;font-weight:500}
/* 【修改2】隐藏时段图片提示小圆点 */
.seat-btn .hidden-dot{position:absolute;top:3px;right:3px;width:8px;height:8px;border-radius:50%;background:#ff4d4f;box-shadow:0 0 3px rgba(255,77,79,.5)}
.seat-btn.expanded .hidden-dot{display:none}
.add-seat-btn{width:calc(20% - 5px);padding:10px 2px;font-size:20px;font-weight:700;border:2px dashed #bfbfbf;border-radius:6px;background:#fafafa;cursor:pointer;text-align:center;color:#8c8c8c;transition:all .15s}
.add-seat-btn:active{background:#e6f7ff;border-color:#1890ff;color:#1890ff}

.timeslot-container{display:none;width:100%;padding:8px 0}
.timeslot-container.show{display:block}
.seat-header{display:flex;align-items:center;padding:8px 4px 10px;gap:8px;flex-wrap:wrap}
.seat-header-label{font-size:15px;color:#666}
.seat-name-text{font-size:17px;font-weight:700;color:#1890ff;cursor:pointer;border-bottom:1px dashed #1890ff;padding-bottom:1px}
.seat-name-hint{font-size:12px;color:#999;margin-left:4px}
.seat-name-edit-input{font-size:17px;font-weight:700;color:#1890ff;border:none;border-bottom:2px solid #1890ff;outline:none;background:transparent;width:120px;padding-bottom:1px}

.timeslot-card{background:#fff;border-radius:8px;margin:6px 0;padding:6px 10px;box-shadow:0 1px 3px rgba(0,0,0,.08);cursor:pointer;display:flex;align-items:center;gap:6px;min-height:44px;flex-wrap:wrap}
.ts-top{display:flex;align-items:center;gap:6px;flex:1;min-width:0}
.ts-checkbox{width:22px;height:22px;border-radius:50%;border:2px solid #bbb;background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s}
.ts-checkbox.checked{background:#1890ff;border-color:#1890ff}
.ts-checkbox.checked::after{content:'✓';color:#fff;font-size:14px;font-weight:700}
.ts-checkbox.disabled{border-color:#e0e0e0;background:#f5f5f5;cursor:not-allowed;opacity:.5}
.ts-time{font-size:15px;font-weight:600;color:#333;white-space:nowrap}
.ts-btns{display:flex;gap:4px;flex-shrink:0;margin-left:auto}
.ts-btn{padding:0 10px;font-size:13px;font-weight:600;border:none;border-radius:5px;cursor:pointer;transition:opacity .15s;min-height:36px;min-width:44px;display:flex;align-items:center;justify-content:center}
.ts-btn:active{opacity:.7}
.ts-btn-capture{background:#1890ff;color:#fff}
.ts-btn-upload{background:#52c41a;color:#fff}
.ts-btn:disabled{opacity:.4;cursor:not-allowed}
.ts-thumbs{display:flex;gap:6px;flex-wrap:wrap;margin-top:4px;padding-left:28px;width:100%}
.thumb-wrap{position:relative;width:80px;height:80px;border-radius:6px;overflow:hidden;border:1px solid #e8e8e8;flex-shrink:0}
.thumb-wrap img{width:100%;height:100%;object-fit:cover;cursor:pointer;background:#f0f0f0}
.thumb-wrap img[data-thumb-src]:not([src]){min-width:80px;min-height:80px}
.thumb-del{position:absolute;top:2px;right:2px;width:22px;height:22px;border-radius:50%;background:rgba(0,0,0,.55);color:#fff;font-size:14px;line-height:22px;text-align:center;cursor:pointer;z-index:2}
.thumb-del:active{background:rgba(255,0,0,.7)}

#bottom-bar{display:none;position:fixed;bottom:0;left:0;right:0;background:#fff;box-shadow:0 -2px 8px rgba(0,0,0,.12);padding:10px 12px;z-index:100;max-width:480px;margin:0 auto;flex-wrap:wrap}
#bottom-bar.show{display:flex;align-items:center;gap:8px}
#selected-count{font-size:13px;color:#666;flex-shrink:0;white-space:nowrap}
#btn-clear-select{padding:8px 12px;font-size:13px;border:1px solid #d9d9d9;border-radius:6px;background:#fff;color:#666;cursor:pointer;flex-shrink:0}
.bar-btn{padding:12px 10px;font-size:14px;font-weight:600;border:none;border-radius:8px;cursor:pointer;flex:1;min-width:0;white-space:nowrap}
.bar-btn:active{opacity:.8}
#btn-download-separate{background:#1890ff;color:#fff;flex-shrink:0;min-width:auto}
#btn-download-concat{background:#fa8c16;color:#fff}

#preview-modal{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.92);z-index:200;overflow:hidden;touch-action:none}
#preview-modal.show{display:block}
#preview-close{position:absolute;top:12px;right:16px;font-size:32px;color:#fff;cursor:pointer;z-index:201;width:44px;height:44px;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.3);border-radius:50%}
#preview-scroller{position:absolute;top:0;left:0;right:0;bottom:0;display:flex;will-change:transform}
.pv-slide{flex:0 0 100%;width:100%;height:100%;display:flex;align-items:center;justify-content:center;position:relative}
.pv-slide img{max-width:100vw;max-height:100vh;object-fit:contain;border-radius:4px;transform-origin:center center;-webkit-user-select:none;user-select:none;-webkit-touch-callout:none;pointer-events:none;will-change:transform}
#preview-indicator{position:absolute;bottom:90px;left:50%;transform:translateX(-50%);color:rgba(255,255,255,.7);font-size:14px;pointer-events:none;z-index:201}
#preview-hint{position:absolute;bottom:20px;left:50%;transform:translateX(-50%);color:rgba(255,255,255,.4);font-size:12px;pointer-events:none}

.modal-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);z-index:250;align-items:center;justify-content:center}
.modal-overlay.show{display:flex}
.modal-box{background:#fff;border-radius:12px;padding:20px 16px;width:92%;max-width:400px;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);max-height:85vh;overflow-y:auto}
.modal-box h3{font-size:17px;margin-bottom:12px;text-align:center}
.modal-btns{display:flex;gap:10px;margin-top:16px}
.modal-btns button{flex:1;padding:12px;font-size:15px;font-weight:600;border:none;border-radius:8px;cursor:pointer}
.modal-btns button:active{opacity:.8}
.modal-cancel{background:#f0f0f0;color:#333}
.modal-confirm{background:#722ed1;color:#fff}

.batch-section{margin-bottom:12px}
.batch-section h4{font-size:14px;margin-bottom:8px;color:#666}
.batch-grid{display:flex;flex-wrap:wrap;gap:6px}
.batch-chip{padding:6px 12px;font-size:13px;border:1px solid #d9d9d9;border-radius:6px;background:#fff;cursor:pointer;user-select:none;transition:all .1s}
.batch-chip.checked{background:#722ed1;color:#fff;border-color:#722ed1}
.batch-chip:active{opacity:.7}
.batch-select-all{padding:6px 12px;font-size:12px;border:1px dashed #722ed1;border-radius:6px;background:#fff;color:#722ed1;cursor:pointer}
.batch-select-all:active{opacity:.7}

.picker-row{display:flex;gap:4px;margin-bottom:16px;height:160px;position:relative;background:#f5f5f5;border-radius:8px;overflow:hidden}
.picker-col{flex:1;height:100%;overflow-y:auto;scroll-snap-type:y mandatory;-webkit-overflow-scrolling:touch;position:relative}
.picker-col::-webkit-scrollbar{display:none}
.picker-pad{height:60px}
.picker-item{height:40px;line-height:40px;text-align:center;font-size:16px;scroll-snap-align:center;cursor:pointer;color:#666;transition:color .15s}
.picker-item.active{color:#1890ff;font-weight:700;font-size:18px}
.picker-highlight{position:absolute;top:60px;left:0;right:0;height:40px;border-top:1px solid #d9d9d9;border-bottom:1px solid #d9d9d9;background:rgba(24,144,255,.06);pointer-events:none;z-index:1}
.picker-col-label{position:absolute;top:4px;width:100%;text-align:center;font-size:11px;color:#999;z-index:2;pointer-events:none}
.cleanup-btns{display:flex;gap:10px}
.cleanup-btns button{flex:1;padding:12px;font-size:15px;font-weight:600;border:none;border-radius:8px;cursor:pointer}
.cleanup-btns button:active{opacity:.8}
.cleanup-cancel{background:#f0f0f0;color:#333}
.cleanup-exec{background:#ff4d4f;color:#fff}

.toast{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(0,0,0,.75);color:#fff;padding:14px 28px;border-radius:8px;font-size:15px;z-index:300;pointer-events:none;animation:toast-fade 2s forwards}
@keyframes toast-fade{0%{opacity:1}70%{opacity:1}100%{opacity:0}}

/* 时段筛选按钮 */
.btn-filter{background:#fa8c16;font-size:13px;padding:6px 12px;font-weight:600;border:none;border-radius:6px;color:#fff;cursor:pointer;white-space:nowrap;display:inline-flex;align-items:center;gap:4px}
.btn-filter:active{opacity:.7}
.btn-filter .filter-icon{font-size:14px}

/* 筛选底部面板 */
.filter-sheet-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.45);z-index:260}
.filter-sheet-overlay.show{display:block}
.filter-sheet{position:fixed;left:0;right:0;bottom:0;background:#fff;border-radius:16px 16px 0 0;z-index:261;transform:translateY(100%);transition:transform .3s ease;max-height:75vh;display:flex;flex-direction:column;max-width:480px;margin:0 auto}
.filter-sheet.show{transform:translateY(0)}
.filter-sheet-header{display:flex;align-items:center;justify-content:space-between;padding:16px 20px 12px;border-bottom:1px solid #f0f0f0;flex-shrink:0}
.filter-sheet-title{font-size:17px;font-weight:700;color:#1a1a1a}
.filter-sheet-close{width:36px;height:36px;border:none;background:#f5f5f5;border-radius:50%;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#999}
.filter-sheet-close:active{background:#e8e8e8}
.filter-sheet-actions{display:flex;gap:8px;padding:12px 20px;border-bottom:1px solid #f0f0f0;flex-shrink:0}
.filter-action-btn{flex:1;padding:10px 0;font-size:13px;font-weight:600;border:1px solid #d9d9d9;border-radius:8px;background:#fff;color:#333;cursor:pointer;min-height:44px;display:flex;align-items:center;justify-content:center}
.filter-action-btn:active{background:#f5f5f5}
.filter-action-btn.primary{border-color:#1890ff;color:#1890ff;background:#e6f7ff}
.filter-action-btn.primary:active{background:#bae7ff}
.filter-sheet-body{overflow-y:auto;padding:8px 20px 24px;flex:1;-webkit-overflow-scrolling:touch}
.filter-slot-item{display:flex;align-items:center;padding:10px 0;min-height:44px;gap:12px;border-bottom:1px solid #f5f5f5;cursor:pointer}
.filter-slot-item:last-child{border-bottom:none}
.filter-slot-item:active{background:#fafafa}
.filter-slot-cb{width:22px;height:22px;border-radius:4px;border:2px solid #bbb;background:#fff;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .15s}
.filter-slot-cb.checked{background:#1890ff;border-color:#1890ff}
.filter-slot-cb.checked::after{content:'✓';color:#fff;font-size:14px;font-weight:700}
.filter-slot-label{font-size:15px;color:#333;font-weight:500}
.filter-slot-label.passed{color:#999}
</style>
</head>
<body>
<div id="app"></div>
<div id="bottom-bar">
  <span id="selected-count">已选 0 个时段</span>
  <button id="btn-clear-select">取消全选</button>
  <button class="bar-btn" id="btn-download-separate">分享选中图片</button>
  <button class="bar-btn" id="btn-download-concat">拼接预览</button>
</div>
<div id="preview-modal">
  <div id="preview-close">&times;</div>
  <div id="preview-scroller"></div>
  <div id="preview-indicator"></div>
  <button id="preview-save-btn">保存图片</button>
  <div id="preview-hint">双指缩放 · 左右滑动 · 下滑关闭</div>
</div>
<div class="modal-overlay" id="batch-modal">
  <div class="modal-box">
    <h3>批量下载</h3>
    <div class="batch-section"><h4>选择区域 <button class="batch-select-all" data-target="area">全选/取消</button></h4><div class="batch-grid" id="batch-areas"></div></div>
    <div class="batch-section"><h4>选择时段 <button class="batch-select-all" data-target="time">全选/取消</button></h4><div class="batch-grid" id="batch-times"></div></div>
    <div class="modal-btns"><button class="modal-cancel" id="batch-cancel">取消</button><button class="modal-confirm" id="batch-exec">打包下载(ZIP)</button></div>
  </div>
</div>
<div class="modal-overlay" id="cleanup-modal">
  <div class="modal-box">
    <h3>批量清理图片</h3>
    <p style="font-size:13px;color:#666;margin-bottom:14px;text-align:center">删除所选日期<strong>之前</strong>添加的所有图片（默认今天）</p>
    <div class="picker-row">
      <div class="picker-highlight"></div>
      <div class="picker-col" id="picker-year"><div class="picker-col-label">年</div><div class="picker-pad"></div></div>
      <div class="picker-col" id="picker-month"><div class="picker-col-label">月</div><div class="picker-pad"></div></div>
      <div class="picker-col" id="picker-day"><div class="picker-col-label">日</div><div class="picker-pad"></div></div>
    </div>
    <div class="cleanup-btns"><button class="cleanup-cancel" id="cleanup-cancel-btn">取消</button><button class="cleanup-exec" id="cleanup-exec-btn">执行清理</button></div>
  </div>
</div>
<div class="filter-sheet-overlay" id="filter-overlay"></div>
<div class="filter-sheet" id="filter-sheet">
  <div class="filter-sheet-header"><span class="filter-sheet-title">选择显示时段（打勾为显示时段）</span><button class="filter-sheet-close" id="filter-close">&times;</button></div>
  <div class="filter-sheet-actions">
    <button class="filter-action-btn primary" id="filter-hide-passed">隐藏已过时段</button>
    <button class="filter-action-btn" id="filter-select-all">全选</button>
    <button class="filter-action-btn" id="filter-clear">清除</button>
  </div>
  <div class="filter-sheet-body" id="filter-body"></div>
</div>
<!-- 【修改3】功能面板 -->
<div class="func-panel-overlay" id="func-panel-overlay"></div>
<div class="func-panel" id="func-panel">
  <div class="func-panel-header"><span class="func-panel-title">功能</span><button class="func-panel-close" id="func-panel-close">&times;</button></div>
  <div class="func-panel-body" id="func-panel-body"></div>
</div>
<script>
// ============================================================
// 一、楼层/区域/座位配置
// ============================================================
// 每个区域：name=显示名, prefix=编号前缀, start=起始编号, count=座位数

// 二、IndexedDB
// ============================================================
let dbInstance = null;
function openDB() {
  if (dbInstance) return Promise.resolve(dbInstance);
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NAME, DB_VERSION);
    req.onupgradeneeded = (e) => {
      // 【修复】onupgradeneeded 加 try-catch 防止建表异常导致整个 DB 打开失败
      try {
        const db = e.target.result;
        if (!db.objectStoreNames.contains('cells')) db.createObjectStore('cells', { keyPath: 'key' });
        if (!db.objectStoreNames.contains('seatNames')) db.createObjectStore('seatNames', { keyPath: 'key' });
        if (!db.objectStoreNames.contains('extraSeats')) db.createObjectStore('extraSeats', { keyPath: 'key' });
        if (!db.objectStoreNames.contains('deletedSeats')) db.createObjectStore('deletedSeats', { keyPath: 'key' });
      } catch (err) {
        console.error('IndexedDB onupgradeneeded error:', err);
      }
    };
    req.onsuccess = (e) => { dbInstance = e.target.result; resolve(dbInstance); };
    req.onerror = (e) => reject(e.target.error);
  });
}
// 【修复】所有 DB 操作添加 tx.onabort 处理，避免事务中断时 Promise 永远 pending
async function dbPut(s, d) { const db = await openDB(); return new Promise((r, j) => { const tx = db.transaction(s, 'readwrite'); tx.objectStore(s).put(d); tx.oncomplete = () => r(); tx.onerror = (e) => j(e.target.error); tx.onabort = (e) => j(e.target.error); }); }
async function dbGet(s, k) { const db = await openDB(); return new Promise((r, j) => { const tx = db.transaction(s, 'readonly'); const req = tx.objectStore(s).get(k); req.onsuccess = () => r(req.result || null); tx.oncomplete = () => r(req.result || null); tx.onerror = (e) => j(e.target.error); tx.onabort = (e) => j(e.target.error); }); }
async function dbDelete(s, k) { const db = await openDB(); return new Promise((r, j) => { const tx = db.transaction(s, 'readwrite'); tx.objectStore(s).delete(k); tx.oncomplete = () => r(); tx.onerror = (e) => j(e.target.error); tx.onabort = (e) => j(e.target.error); }); }
async function dbGetAll(s) { const db = await openDB(); return new Promise((r, j) => { const tx = db.transaction(s, 'readonly'); const req = tx.objectStore(s).getAll(); req.onsuccess = () => r(req.result); tx.oncomplete = () => r(req.result || []); tx.onerror = (e) => j(e.target.error); tx.onabort = (e) => j(e.target.error); }); }
async function saveCellData(k, imgs) {
  // 存入 IndexedDB 前，清理临时字段（ObjectURL 等页面刷新后失效，Blob 对象不可序列化）
  const cleanImgs = imgs.map(img => {
    const clean = { ...img };
    delete clean._tempURL;
    delete clean._fullBlob;
    delete clean._thumbBlob;
    delete clean._fullBlobURL;
    delete clean._thumbBlobURL;
    // thumbnail/data 如果是 ObjectURL，存入 DB 时清空（刷新后失效）
    if (clean.thumbnail && clean.thumbnail.startsWith('blob:')) clean.thumbnail = '';
    if (clean.data && clean.data.startsWith('blob:')) clean.data = '';
    return clean;
  });
  try { await dbPut('cells', { key: k, images: cleanImgs }); }
  catch (err) {
    if (err.name === 'QuotaExceededError' || (err.message && err.message.includes('quota'))) {
      showToast('存储空间不足！请清理部分图片后重试');
    }
    throw err;
  }
}

// 【优化】批量读取多个 key 的图片数据（单事务），避免逐条异步读取
async function getCellDataBatch(keys) {
  const db = await openDB();
  return new Promise((r, j) => {
    const tx = db.transaction('cells', 'readonly');
    const results = {};
    keys.forEach(k => {
      const req = tx.objectStore('cells').get(k);
      req.onsuccess = () => { if (req.result) results[k] = req.result; };
    });
    tx.oncomplete = () => r(results);
    tx.onerror = (e) => j(e.target.error);
    tx.onabort = (e) => j(e.target.error);
  });
}

const state = {
  expandedFloors: new Set(), expandedAreas: new Set(), expandedSeats: new Set(),
  selectedCells: [], seatNames: {}, seatHasImages: new Set(),
  extraSeats: {}, deletedSeats: new Set(),
  visibleTimeSlots: new Set(), _filterNone: false, // 时段筛选：空集+!_filterNone=全显，空集+_filterNone=全不显
  autoShare: false, // 拍照后自动分享开关，默认关闭
  allowDeleteSeat: false, // 【修改1】允许删除座位开关，默认关闭

/** 生成区域 key */
function areaKey(fid, aname) { return `${fid}-${aname}`; }
/** 生成座位 key */
function seatKey(fid, aname, idx) { return `${fid}-${aname}-${idx}`; }
/** 生成单元格 key */
function cellKey(fid, aname, sidx, tidx) { return `${fid}-${aname}-${sidx}-${tidx}`; }
/** 从单元格 key 提取座位 key */
function cellToSeatKey(ck) { return ck.split('-').slice(0, 3).join('-'); }

/** 获取某区域的配置（从 FLOORS 常量中查找） */
function getAreaConfig(fid, aname) {
  const floor = FLOORS.find(f => f.id === fid);
  return floor ? floor.areas.find(a => a.name === aname) : null;
}

/** 获取某区域的座位数量（基础 + 新增） */
function getAreaSeatCount(fid, aname) {
  const cfg = getAreaConfig(fid, aname);
  const base = cfg ? cfg.count : 0;
  const ak = areaKey(fid, aname);
  const extra = state.extraSeats[ak] || 0;
  return base + extra;
}

/** 获取座位默认编号 */
function defaultSeatName(fid, aname, idx) {
  const cfg = getAreaConfig(fid, aname);
  if (!cfg) return `${aname}${idx + 1}`;
  const baseCount = cfg.count;
  if (idx < baseCount) {
    // 基础座位：prefix + (start + idx)
    return `${cfg.prefix}${cfg.start + idx}`;
  } else {
    // 新增座位：prefix + (start + baseCount + (idx - baseCount))
    return `${cfg.prefix}${cfg.start + idx}`;
  }
}

/** 获取座位编号（优先自定义） */
function getSeatNameSync(fid, aname, idx) {
  const sk = seatKey(fid, aname, idx);
  return state.seatNames[sk] || defaultSeatName(fid, aname, idx);
}

/** 获取北京时间字符串 */
function getBeijingTime() {
  const now = new Date();
  const opts = { timeZone: 'Asia/Shanghai', year: 'numeric', month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false };
  const parts = new Intl.DateTimeFormat('zh-CN', opts).formatToParts(now);
  const get = (type) => parts.find(p => p.type === type).value;
  return `${get('year')}-${get('month')}-${get('day')} ${get('hour')}:${get('minute')}:${get('second')}`;
}

// 【修改2】座位图片统计：{ visibleCount, hiddenHasImages } 分层提示
// seatImageStats: Map<seatKey, { visibleCount: number, hiddenHasImages: boolean }>
const seatImageStats = new Map();

// 【性能优化】只读取图片计数，不加载完整图片数据
// 使用轻量索引存储，避免 dbGetAll('cells') 加载所有图片到内存
const imageCountCache = new Map(); // Map<cellKey, number> 缓存每个单元格的图片数量

/** 【性能优化】从 IndexedDB 批量读取图片计数（不加载图片数据），单事务 */
async function dbGetImageCounts() {
  const db = await openDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction('cells', 'readonly');
    const store = tx.objectStore('cells');
    const counts = new Map();
    const req = store.openCursor();
    req.onsuccess = (e) => {
      const cursor = e.target.result;
      if (cursor) {
        const r = cursor.value;
        if (r.images && r.images.length > 0) {
          counts.set(r.key, r.images.length);
        }
        cursor.continue();
      }
    };
    tx.oncomplete = () => resolve(counts);
    tx.onerror = (e) => reject(e.target.error);
    tx.onabort = (e) => reject(e.target.error);
  });
}

async function buildSeatHasImages() {
  // 【性能优化】使用轻量计数读取，不加载完整图片数据
  const counts = await dbGetImageCounts();
  imageCountCache.clear();
  counts.forEach((cnt, key) => imageCountCache.set(key, cnt));
  state.seatHasImages = new Set();
  seatImageStats.clear();
  imageCountCache.forEach((cnt, key) => {
    if (cnt > 0) {
      const sk = key.split('-').slice(0, 3).join('-');
      state.seatHasImages.add(sk);
    }
  });
  // 计算分层统计
  refreshSeatImageStatsFromCache();
}

/** 【性能优化】从内存缓存计算统计，不再读取 IndexedDB */
function refreshSeatImageStatsFromCache() {
  seatImageStats.clear();
  imageCountCache.forEach((cnt, key) => {
    if (cnt <= 0) return;
    const p = key.split('-');
    const sk = p.slice(0, 3).join('-');
    const tidx = parseInt(p[3]);
    if (!seatImageStats.has(sk)) seatImageStats.set(sk, { visibleCount: 0, hiddenHasImages: false });
    const stat = seatImageStats.get(sk);
    if (isTimeSlotVisible(tidx)) {
      stat.visibleCount++;
    } else {
      stat.hiddenHasImages = true;
    }
  });
}

/** 【修改2】刷新所有座位的图片统计（可见时段图片数、隐藏时段是否有图） */
async function refreshSeatImageStats() {
  // 【性能优化】优先从内存缓存计算，仅缓存为空时才读 IndexedDB
  if (imageCountCache.size > 0) {
    refreshSeatImageStatsFromCache();
    return;
  }
  const counts = await dbGetImageCounts();
  imageCountCache.clear();
  counts.forEach((cnt, key) => imageCountCache.set(key, cnt));
  refreshSeatImageStatsFromCache();
}

/** 【修改2】刷新单个座位的图片统计（同步，仅读内存缓存） */
function refreshSingleSeatStats(sk) {
  const parts = sk.split('-'), fid = parseInt(parts[0]), aname = parts[1], sidx = parseInt(parts[2]);
  let visibleCount = 0, hiddenHasImages = false;
  // 【性能优化】从内存缓存读取计数，不加载图片数据
  for (let t = 0; t < TIME_SLOTS.length; t++) {
    const ck = cellKey(fid, aname, sidx, t);
    const cnt = imageCountCache.get(ck) || 0;
    if (cnt <= 0) continue;
    if (isTimeSlotVisible(t)) visibleCount++;
    else hiddenHasImages = true;
  }
  seatImageStats.set(sk, { visibleCount, hiddenHasImages });
}

/** 判断某时段索引是否在当前北京时间已过（严格大于时段时间为已过） */
function isTimeSlotPassed(tIdx) {
  const now = new Date();
  const opts = { timeZone: 'Asia/Shanghai', hour: '2-digit', minute: '2-digit', hour12: false };
  const parts = new Intl.DateTimeFormat('en-US', opts).formatToParts(now);
  // 【修复】处理某些 locale 返回 hour=24 的边界情况
  const h = parseInt(parts.find(p => p.type === 'hour').value) % 24;
  const m = parseInt(parts.find(p => p.type === 'minute').value);
  const nowMinutes = h * 60 + m;
  const slot = TIME_SLOTS[tIdx];
  const [sh, sm] = slot.split(':').map(Number);
  const slotMinutes = sh * 60 + sm;
  // 当前时间 > 时段时间表示该时段已过
  return nowMinutes > slotMinutes;
}

/** 判断某时段是否应该显示 */
function isTimeSlotVisible(tIdx) {
  // visibleTimeSlots 为空且无特殊标记时，默认全部显示
  if (state.visibleTimeSlots.size === 0 && !state._filterNone) return true;
  return state.visibleTimeSlots.has(tIdx);
}

const app = document.getElementById('app');
// 【修复Bug3】renderMain 并发保护：序列号机制，旧调用自动让路给新调用
let _renderMainSeq = 0;
async function renderMain() {
  const mySeq = ++_renderMainSeq;
  // 【修改3】顶部只保留标题和功能按钮
  // 【修复Bug3】按钮加 id="func-btn"，方便定位和校验文字
  let html = '<div class="page-header"><span class="page-title">图书馆座位图片管理</span><button id="func-btn" class="header-btn btn-batch-dl" data-action="open-func-panel" style="font-size:14px;padding:8px 16px">功能</button></div>';
  // 【优化】预计算每个区域的已删除座位数，避免每个区域都遍历全量 deletedSeats
  const deletedCountMap = {};
  state.deletedSeats.forEach(sk => {
    const parts = sk.split('-');
    const ak = `${parts[0]}-${parts[1]}`;
    deletedCountMap[ak] = (deletedCountMap[ak] || 0) + 1;
  });
  FLOORS.forEach(floor => {
    const fid = floor.id, expanded = state.expandedFloors.has(fid);
    // 计算楼层总座位数
    let floorTotal = 0;
    floor.areas.forEach(area => { floorTotal += getAreaSeatCount(fid, area.name) - (deletedCountMap[areaKey(fid, area.name)] || 0); });
    html += `<button class="floor-btn floor-${fid} ${expanded ? 'expanded' : ''}" data-action="toggle-floor" data-floor="${fid}">${floor.name}<span class="floor-count">${floorTotal}座</span><span class="arrow">▶</span></button>`;
    html += `<div class="area-container ${expanded ? 'show' : ''}" id="areas-${fid}">`;
    floor.areas.forEach(area => {
      const aname = area.name, ak = areaKey(fid, aname), aExp = state.expandedAreas.has(ak);
      const areaTotal = getAreaSeatCount(fid, aname) - (deletedCountMap[ak] || 0);
      // 判断区域是否有图片：遍历该区域所有座位检查 seatHasImages
      let areaHasImages = false;
      for (let si = 0; si < getAreaSeatCount(fid, aname); si++) {
        if (state.seatHasImages.has(seatKey(fid, aname, si))) { areaHasImages = true; break; }
      }
      html += `<button class="area-btn ${aExp ? 'expanded' : ''} ${areaHasImages ? 'has-images' : ''}" data-action="toggle-area" data-floor="${fid}" data-area="${aname}"><span>${aname}<span class="arrow">▶</span></span><span class="area-count">${areaTotal}座</span></button>`;
      html += `<div class="seat-container ${aExp ? 'show' : ''}" id="seats-${ak}">${renderSeatFlow(fid, aname)}</div>`;
    });
    html += '</div>';
  });
  app.innerHTML = html;
  // 【修复Bug3】确保"功能"按钮文字始终显示，并启动 MutationObserver 持续监控
  ensureFuncBtnText();
  startFuncBtnObserver();
  // 【修复BUG】串行执行 renderTimeSlots，避免并发 DOM 操作冲突
  // 【修复Bug3】每次 await 前检查序列号，旧调用自动让路
  for (const sk of state.expandedSeats) {
    if (_renderMainSeq !== mySeq) return; // 有更新的 renderMain 调用，当前调用终止
    await renderTimeSlots(sk);
  }
}

// 【修复Bug3】确保"功能"按钮文字始终显示，防止异步竞态或页面恢复时文字消失
function ensureFuncBtnText() {
  const btn = document.getElementById('func-btn');
  if (btn && !btn.textContent.trim()) {
    btn.textContent = '功能';
  }
}

// 【修复Bug3】MutationObserver 持续监控功能按钮，文字被清空时立即恢复
let _funcBtnObserver = null;
function startFuncBtnObserver() {
  if (_funcBtnObserver) _funcBtnObserver.disconnect();
  const btn = document.getElementById('func-btn');
  if (!btn) return;
  _funcBtnObserver = new MutationObserver(() => {
    if (!btn.textContent.trim()) btn.textContent = '功能';
  });
  _funcBtnObserver.observe(btn, { childList: true, characterData: true, subtree: true });
}

// 【修复Bug3】页面从后台恢复时，校验并恢复"功能"按钮文字
document.addEventListener('visibilitychange', () => {
  if (!document.hidden) {
    requestAnimationFrame(() => { ensureFuncBtnText(); startFuncBtnObserver(); });
  }
});

function renderSeatFlow(fid, aname) {
  const count = getAreaSeatCount(fid, aname);
  let html = '<div class="seat-flow">';
  for (let i = 0; i < count; i++) {
    const sk = seatKey(fid, aname, i);
    if (state.deletedSeats.has(sk)) continue;
    const sName = getSeatNameSync(fid, aname, i), sExp = state.expandedSeats.has(sk), hasImg = state.seatHasImages.has(sk);
    // 【修改2】座位视觉分层 + 隐藏时段小圆点
    const stat = seatImageStats.get(sk);
    let imgClass = '';
    if (stat && stat.visibleCount > 0) imgClass = stat.visibleCount >= 2 ? 'has-images-2' : 'has-images-1';
    else if (hasImg) imgClass = 'has-images-1';
    const hiddenDot = (stat && stat.hiddenHasImages && !sExp) ? '<span class="hidden-dot"></span>' : '';
    html += `<button class="seat-btn ${sExp ? 'expanded' : ''} ${imgClass}" data-action="toggle-seat" data-floor="${fid}" data-area="${aname}" data-seat="${i}">${sName}${hiddenDot}</button>`;
    html += `<div class="timeslot-container ${sExp ? 'show' : ''}" id="timeslots-${sk}"></div>`;
  }
  html += `<button class="add-seat-btn" data-action="add-seat" data-floor="${fid}" data-area="${aname}">+</button></div>`;
  return html;
}

// 【修复问题2】座位时段 DOM 缓存：缓存最近展开的座位渲染结果，避免重复从 IndexedDB 读取
// 收起座位后再展开时，如果数据未变，直接复用缓存的 DOM，避免从上往下重新渲染
const timeslotDOMCache = new Map(); // Map<seatKey, { html: string, imageCounts: string }>
const TIMESLOT_DOM_CACHE_MAX = 3; // 最多缓存 3 个座位的 DOM

/** 清除某个座位的 DOM 缓存（数据变化时调用） */
function invalidateTimeslotCache(sk) {
  timeslotDOMCache.delete(sk);
}

/** 清除所有 DOM 缓存 */
function invalidateAllTimeslotCache() {
  timeslotDOMCache.clear();
}

async function renderTimeSlots(sk) {
  const container = document.getElementById('timeslots-' + sk);
  if (!container) return;
  const parts = sk.split('-'), fid = parseInt(parts[0]), aname = parts[1], sidx = parseInt(parts[2]);
  const sName = getSeatNameSync(fid, aname, sidx);

  // 【修复Bug1】构建图片计数指纹：用所有时段（不只是可见的），筛选变化不会导致缓存失效
  let countFingerprint = '';
  for (let t = 0; t < TIME_SLOTS.length; t++) {
    const ck = cellKey(fid, aname, sidx, t);
    countFingerprint += `${ck}:${imageCountCache.get(ck) || 0},`;
  }
  // 【修复Bug2】指纹包含删除座位开关状态，确保开关切换时缓存失效
  countFingerprint += `|del:${state.allowDeleteSeat ? '1' : '0'}`;

  // 【修复问题2】检查 DOM 缓存：如果数据未变，直接复用缓存的 HTML
  const cached = timeslotDOMCache.get(sk);
  if (cached && cached.countFingerprint === countFingerprint) {
    container.innerHTML = cached.html;
    container.querySelectorAll('img[data-thumb-src]').forEach(img => thumbObserver.observe(img));
    // 【修复Bug1】复用缓存时也要应用筛选显隐
    applyTimeslotFilter(container);
    return;
  }

  // 【修改1】删除座位按钮受开关控制
  const delBtnClass = state.allowDeleteSeat ? 'btn-delete-seat visible' : 'btn-delete-seat';
  let html = `<div class="seat-header"><span class="seat-header-label">座位编号：</span><span class="seat-name-text" data-action="edit-seat-name" data-seat-key="${sk}">${sName}</span><span class="seat-name-hint">（点击修改）</span><button class="${delBtnClass}" data-action="delete-seat" data-seat-key="${sk}">删除座位</button></div>`;
  // 【修复Bug1】批量读取该座位所有时段的数据（不只是可见的），渲染所有时段卡片
  const allKeys = [];
  for (let t = 0; t < TIME_SLOTS.length; t++) {
    allKeys.push(cellKey(fid, aname, sidx, t));
  }
  const cellDataMap = await getCellDataBatch(allKeys);
  let needThumbGen = false;
  for (let t = 0; t < TIME_SLOTS.length; t++) {
    const ck = cellKey(fid, aname, sidx, t);
    const visible = isTimeSlotVisible(t);
    // 【修复Bug1】渲染所有时段，不可见的用 data-tidx + display:none 标记
    const displayStyle = visible ? '' : 'display:none;';
    const cellData = cellDataMap[ck] || null;
    const images = (cellData && cellData.images) ? cellData.images : [];
    const hasImages = images.length > 0, isFull = images.length >= MAX_IMAGES, isSel = state.selectedCells.includes(ck);
    const cbClass = hasImages ? `ts-checkbox ${isSel ? 'checked' : ''}` : 'ts-checkbox disabled';
    html += `<div class="timeslot-card" data-tidx="${t}" style="${displayStyle}" data-action="toggle-card" data-cell-key="${ck}" data-has-images="${hasImages ? '1' : '0'}"><div class="ts-top"><div class="${cbClass}" data-action="toggle-select" data-cell-key="${ck}"></div><span class="ts-time">${TIME_SLOTS[t]}</span><div class="ts-btns"><button class="ts-btn ts-btn-capture" ${isFull ? 'disabled' : ''} data-action="capture" data-cell-key="${ck}">拍照</button><button class="ts-btn ts-btn-upload" ${isFull ? 'disabled' : ''} data-action="upload" data-cell-key="${ck}">上传</button></div></div>`;
    if (images.length > 0) {
      html += '<div class="ts-thumbs">';
      images.forEach((img, idx) => {
        // 【终极方案】优先使用 Blob URL（拍照后立即可用），回退到 Base64 缩略图
        let thumbSrc = img._thumbBlobURL || img.thumbnail || img.thumb || '';
        // 如果缩略图为空但有内存 Blob 缓存，用缓存
        if (!thumbSrc) {
          const memBlob = getMemoryBlobURL(ck, idx);
          if (memBlob && memBlob.thumbBlobURL) thumbSrc = memBlob.thumbBlobURL;
        }
        const isObjectURL = thumbSrc && thumbSrc.startsWith('blob:');
        const hasData = img.data && !img._placeholder;
        if (!thumbSrc && !hasData && !img._fullBlobURL) needThumbGen = true;
        if (isObjectURL) {
          // Blob URL 直接显示，不走懒加载
          html += `<div class="thumb-wrap"><img src="${thumbSrc}" data-action="preview" data-cell-key="${ck}" data-img-idx="${idx}" /><div class="thumb-del" data-action="delete-img" data-cell-key="${ck}" data-img-idx="${idx}">&times;</div></div>`;
        } else if (thumbSrc) {
          // Base64 缩略图走懒加载
          html += `<div class="thumb-wrap"><img data-thumb-src="${thumbSrc}" data-action="preview" data-cell-key="${ck}" data-img-idx="${idx}" /><div class="thumb-del" data-action="delete-img" data-cell-key="${ck}" data-img-idx="${idx}">&times;</div></div>`;
        } else if (hasData) {
          html += `<div class="thumb-wrap"><img src="${img.data}" data-action="preview" data-cell-key="${ck}" data-img-idx="${idx}" /><div class="thumb-del" data-action="delete-img" data-cell-key="${ck}" data-img-idx="${idx}">&times;</div></div>`;
        } else if (img._fullBlobURL) {
          // 有 fullBlobURL 但无缩略图，用原图 Blob URL 显示
          html += `<div class="thumb-wrap"><img src="${img._fullBlobURL}" data-action="preview" data-cell-key="${ck}" data-img-idx="${idx}" /><div class="thumb-del" data-action="delete-img" data-cell-key="${ck}" data-img-idx="${idx}">&times;</div></div>`;
        } else {
          html += `<div class="thumb-wrap" style="background:#e6f7ff;display:flex;align-items:center;justify-content:center;font-size:10px;color:#1890ff">处理中</div>`;
        }
      });
      html += '</div>';
    }
    html += '</div>';
  }
  container.innerHTML = html;
  container.querySelectorAll('img[data-thumb-src]').forEach(img => thumbObserver.observe(img));
  if (needThumbGen) generateMissingThumbnails(fid, aname, sidx);
  // 【修复问题2】更新 DOM 缓存：保存渲染结果，下次展开时直接复用
  if (timeslotDOMCache.size >= TIMESLOT_DOM_CACHE_MAX) {
    const firstKey = timeslotDOMCache.keys().next().value;
    timeslotDOMCache.delete(firstKey);
  }
  timeslotDOMCache.set(sk, { html, countFingerprint });
}

/** 【修复Bug1】轻量级筛选切换：只切换时段卡片的 CSS 显隐，不重建 DOM */
function applyTimeslotFilter(container) {
  if (!container) return;
  container.querySelectorAll('.timeslot-card[data-tidx]').forEach(card => {
    const tidx = parseInt(card.dataset.tidx);
    card.style.display = isTimeSlotVisible(tidx) ? '' : 'none';

/** 【修改2】更新座位按钮视觉：分层提示 + 隐藏时段小圆点 */
/** 【修改2】更新座位按钮视觉：分层提示 + 隐藏时段小圆点（同步） */
function updateSeatVisual(sk) {
  // 先刷新该座位的统计（同步，仅读内存缓存）
  refreshSingleSeatStats(sk);

/** 更新区域按钮的 has-images 状态 */
function updateAreaVisual(fid, aname) {

// ============================================================
// 五、图片压缩与水印
// ============================================================

/** 【性能优化-深度】将图片重新编码为 JPEG Blob，保持原分辨率
 *  返回 Blob 而非 Base64 DataURL，减少编解码开销
 *  仅在需要存入 IndexedDB 时才通过 blobToDataURL 转换 */
function compressImageBlob(imageData, quality = 0.95) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.onload = () => {
      try {
        const canvas = document.createElement('canvas');
        canvas.width = img.naturalWidth; canvas.height = img.naturalHeight;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0);
        canvas.toBlob(blob => {
          if (blob) resolve(blob);
          else reject(new Error('图片压缩失败：toBlob 返回 null'));
        }, 'image/jpeg', quality);
      } catch (err) { reject(new Error('图片压缩失败: ' + err.message)); }
    };
    img.onerror = () => reject(new Error('图片压缩失败'));
    img.src = imageData;
  });
}

/** 【兼容】将图片重新编码为 JPEG DataURL，保持原分辨率 */
function compressImage(imageData, quality = 0.95) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.onload = () => {
      try {
        const canvas = document.createElement('canvas');
        canvas.width = img.naturalWidth; canvas.height = img.naturalHeight;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0);
        resolve(canvas.toDataURL('image/jpeg', quality));
      } catch (err) { reject(new Error('图片压缩失败: ' + err.message)); }
    };
    img.onerror = () => reject(new Error('图片压缩失败'));
    img.src = imageData;
  });
}

/** 【兼容】addWatermark：返回 Base64 DataURL，供 getProcessedData / pvLoadFullImage / regenerateWatermarks 使用 */
async function addWatermark(imageData, seatName, beijingTime) {
  const { fullBlob } = await addWatermarkBlob(imageData, seatName, beijingTime);
  return blobToDataURL(fullBlob);
}

// 【性能优化】Blob URL 管理器：跟踪临时 Blob URL，关闭预览时统一回收
const pvBlobURLs = new Map(); // Map<urlString, true>

/** 安全创建 Blob URL 并注册到管理器 */
function createTrackedBlobURL(blob) {
  const url = URL.createObjectURL(blob);
  pvBlobURLs.set(url, true);
  return url;
}

/** 回收所有已注册的 Blob URL */
function revokeAllBlobURLs() {
  pvBlobURLs.forEach((_, url) => { try { URL.revokeObjectURL(url); } catch (e) {} });
  pvBlobURLs.clear();
}

// 【性能优化-深度】内存 Blob 缓存：拍照/处理后缓存 fullBlob 和 thumbBlob 的 Blob URL
// 避免预览时重新从 IndexedDB 读取或重新生成水印
const memoryBlobCache = new Map(); // Map<cellKey, Array<{fullBlobURL, thumbBlobURL, fullBlob, thumbBlob}>>
const MEMORY_BLOB_CACHE_MAX = 50; // 【性能优化-深度】内存 Blob 缓存上限，防止内存无限增长
/** 缓存某个单元格的图片 Blob URL 到内存
 *  【性能优化-深度】Blob URL 不注册到 pvBlobURLs（持久缓存，不受 closePreview 影响）
 *  超出上限时淘汰最早的条目 */
function cacheCellBlobs(cellKey, images) {
  // 先清除旧缓存
  clearCellBlobCache(cellKey);
  // 【性能优化-深度】LRU 淘汰：超出上限时删除最早的条目
  if (memoryBlobCache.size >= MEMORY_BLOB_CACHE_MAX) {
    const firstKey = memoryBlobCache.keys().next().value;
    clearCellBlobCache(firstKey);
  }
  const arr = [];
  for (let i = 0; i < images.length; i++) {
    const item = images[i];
    if (item._fullBlob) {
      const fullBlobURL = URL.createObjectURL(item._fullBlob);
      const thumbBlobURL = item._thumbBlob ? URL.createObjectURL(item._thumbBlob) : '';
      arr.push({ fullBlobURL, thumbBlobURL, fullBlob: item._fullBlob, thumbBlob: item._thumbBlob || null });
    } else {
      arr.push(null);
    }
  }
  memoryBlobCache.set(cellKey, arr);
}

/** 从内存缓存获取某张图片的 Blob URL（预览时优先使用） */
function getMemoryBlobURL(cellKey, imgIdx) {
  const arr = memoryBlobCache.get(cellKey);
  if (!arr || !arr[imgIdx]) return null;
  return arr[imgIdx];
}

/** 清除某单元格的内存 Blob 缓存 */
function clearCellBlobCache(cellKey) {
  const arr = memoryBlobCache.get(cellKey);
  if (arr) {
    arr.forEach(item => {
      if (item) {
        try { if (item.fullBlobURL) URL.revokeObjectURL(item.fullBlobURL); } catch (e) {}
        try { if (item.thumbBlobURL) URL.revokeObjectURL(item.thumbBlobURL); } catch (e) {}
      }
    });
    memoryBlobCache.delete(cellKey);
  }
}
/** 添加水印并返回 { fullBlob, thumbBlob }，避免重复 Canvas 操作
 *  水印三行：第一行年月日（小号细体），第二行时分秒（大号粗体），第三行座位编号（中号常规）
 *  基准字号：短边×10%，限制在36~200px */
function addWatermarkBlob(imageData, seatName, beijingTime) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.onload = () => {
      try {
        const canvas = document.createElement('canvas');
        canvas.width = img.naturalWidth; canvas.height = img.naturalHeight;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0);
        // 基准字号：短边×10%，限制在36~200px
        const shortSide = Math.min(img.naturalWidth, img.naturalHeight);
        const fs = Math.max(36, Math.min(200, Math.round(shortSide * 0.10)));
        const scaleFactor = fs / 52;
        // 【修复Bug2】三行字号：日期小号、时间大号、座位中号
        const fs_date = Math.max(14, Math.round(18 * scaleFactor));  // 第一行：年月日（小号，细体）
        const fs_time = fs;                                           // 第二行：时分秒（大号，粗体）
        const fs_seat = Math.max(20, Math.round(36 * scaleFactor));   // 第三行：座位编号（中号，常规）
        const lineGap = Math.round(fs_time * 0.12);
        const pad = Math.round(fs_time * 0.3);   // 左右内边距
        const vpad = Math.round(fs_time * 0.2);  // 上下内边距
        const r = 8; // 固定圆角
        const fontFam = '-apple-system, sans-serif';
        // 拆分北京时间
        const datePart = beijingTime.split(' ')[0];
        const timePart = beijingTime.split(' ')[1] || beijingTime;
        // 逐行测量宽度
        ctx.font = `300 ${fs_date}px ${fontFam}`;
        const tw1 = ctx.measureText(datePart).width;
        ctx.font = `700 ${fs_time}px ${fontFam}`;
        const tw2 = ctx.measureText(timePart).width;
        ctx.font = `400 ${fs_seat}px ${fontFam}`;
        const tw3 = ctx.measureText(seatName).width;
        const maxTW = Math.max(tw1, tw2, tw3);
        const totalH = fs_date + fs_time + fs_seat + lineGap * 2;
        const bgX = 24, bgY = canvas.height - totalH - vpad * 2 - 24;
        const bgW = maxTW + pad * 2, bgH = totalH + vpad * 2;
        // 半透明圆角背景
        ctx.fillStyle = 'rgba(0,0,0,0.55)';
        ctx.beginPath();
        ctx.moveTo(bgX + r, bgY); ctx.lineTo(bgX + bgW - r, bgY);
        ctx.quadraticCurveTo(bgX + bgW, bgY, bgX + bgW, bgY + r);
        ctx.lineTo(bgX + bgW, bgY + bgH - r);
        ctx.quadraticCurveTo(bgX + bgW, bgY + bgH, bgX + bgW - r, bgY + bgH);
        ctx.lineTo(bgX + r, bgY + bgH);
        ctx.quadraticCurveTo(bgX, bgY + bgH, bgX, bgY + bgH - r);
        ctx.lineTo(bgX, bgY + r);
        ctx.quadraticCurveTo(bgX, bgY, bgX + r, bgY);
        ctx.closePath(); ctx.fill();
        // 绘制三行白色文本：年月日（细体）、时分秒（粗体）、座位编号（常规）
        ctx.textBaseline = 'top'; ctx.fillStyle = '#ffffff';
        const textX = bgX + pad;
        let curY = bgY + vpad;
        ctx.font = `300 ${fs_date}px ${fontFam}`;
        ctx.fillText(datePart, textX, curY);
        curY += fs_date + lineGap;
        ctx.font = `700 ${fs_time}px ${fontFam}`;
        ctx.fillText(timePart, textX, curY);
        curY += fs_time + lineGap;
        ctx.font = `400 ${fs_seat}px ${fontFam}`;
        ctx.fillText(seatName, textX, curY);
        // 一次 Canvas 绘制，同时导出原图 Blob 和缩略图 Blob
        const fullPromise = new Promise(r => canvas.toBlob(r, 'image/jpeg', 0.95));
        // 从同一个 Canvas 生成缩略图
        const thumbCanvas = document.createElement('canvas');
        const scale = Math.min(200 / img.naturalWidth, 1);
        thumbCanvas.width = Math.round(img.naturalWidth * scale);
        thumbCanvas.height = Math.round(img.naturalHeight * scale);
        const tCtx = thumbCanvas.getContext('2d');
        tCtx.drawImage(canvas, 0, 0, thumbCanvas.width, thumbCanvas.height);
        const thumbPromise = new Promise(r => thumbCanvas.toBlob(r, 'image/jpeg', 0.8));
        Promise.all([fullPromise, thumbPromise]).then(([fullBlob, thumbBlob]) => {
          // 【内存优化】Canvas 使用完立即释放
          canvas.width = 0; canvas.height = 0;
          thumbCanvas.width = 0; thumbCanvas.height = 0;
          resolve({ fullBlob, thumbBlob });
        });
      } catch (err) { reject(new Error('水印生成失败: ' + err.message)); }
    };
    img.onerror = () => reject(new Error('图片加载失败'));
    img.src = imageData;
  });
}

// ============================================================
// 五-B、缩略图生成与懒加载
// ============================================================

/** 【性能优化-深度】生成缩略图 Blob：宽度 200px，等比缩放，返回 Blob
 *  比 generateThumbnail 更快，因为跳过了 Base64 编码步骤 */
function generateThumbnailBlob(imageSource, targetWidth = 200) {
  return new Promise((resolve) => {
    const img = new Image();
    img.onload = () => {
      try {
        const canvas = document.createElement('canvas');
        const scale = Math.min(targetWidth / img.naturalWidth, 1);
        canvas.width = Math.round(img.naturalWidth * scale);
        canvas.height = Math.round(img.naturalHeight * scale);
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
        canvas.toBlob(blob => {
          if (blob) resolve(blob);
          else resolve(null); // 降级返回 null
        }, 'image/jpeg', 0.8);
      } catch (err) {
        console.error('缩略图 Blob 生成失败:', err);
        resolve(null);
      }
    };
    img.onerror = () => resolve(null);
    img.src = imageSource;
  });
}

/** 生成缩略图：宽度 200px，等比缩放，JPEG 质量 0.8（返回 DataURL，兼容旧逻辑） */
function generateThumbnail(imageData, targetWidth = 200) {
  return new Promise((resolve) => {
    const img = new Image();
    img.onload = () => {
      try {
        const canvas = document.createElement('canvas');
        const scale = Math.min(targetWidth / img.naturalWidth, 1);
        canvas.width = Math.round(img.naturalWidth * scale);
        canvas.height = Math.round(img.naturalHeight * scale);
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
        resolve(canvas.toDataURL('image/jpeg', 0.8));
      } catch (err) {
        console.error('缩略图生成失败:', err);
        resolve(imageData); // 降级返回原图
      }
    };
    img.onerror = () => resolve(imageData);
    img.src = imageData;
  });
}

const thumbObserver = new IntersectionObserver((entries) => {
  entries.forEach(entry => {
    if (entry.isIntersecting) {
      const img = entry.target;
      if (img.dataset.thumbSrc) {
        img.src = img.dataset.thumbSrc;
        delete img.dataset.thumbSrc;
      }
      thumbObserver.unobserve(img);
    }
  });
}, { rootMargin: '300px' });

// 【优化】批量读取后生成缺失缩略图，避免逐条异步读取
async function generateMissingThumbnails(fid, aname, sidx) {
  const keys = [];
  for (let t = 0; t < TIME_SLOTS.length; t++) {
    keys.push(cellKey(fid, aname, sidx, t));
  }
  const cellDataMap = await getCellDataBatch(keys);
  for (let t = 0; t < TIME_SLOTS.length; t++) {
    const ck = cellKey(fid, aname, sidx, t);
    const cd = cellDataMap[ck];
    if (!cd || !cd.images) continue;
    let changed = false;
    for (let i = 0; i < cd.images.length; i++) {
      if (!cd.images[i].thumbnail && cd.images[i].data) {
        cd.images[i].thumbnail = await generateThumbnail(cd.images[i].data);
        changed = true;
      }
    }
    if (changed) await saveCellData(ck, cd.images);
  }
}

// 六、文件输入

let currentCaptureCellKey = null, currentUploadCellKey = null;
function readFileAsDataURL(file) { return new Promise((r, j) => { const rd = new FileReader(); rd.onload = () => r(rd.result); rd.onerror = () => j(rd.error); rd.readAsDataURL(file); }); }

captureInput.addEventListener('change', async (e) => {
  const file = e.target.files[0];
  if (!file || !currentCaptureCellKey) { captureInput.value = ''; return; }
  const ck = currentCaptureCellKey; currentCaptureCellKey = null;
  try {
    const cellData = await getCellData(ck);
    const images = (cellData && cellData.images) ? [...cellData.images] : [];
    if (images.length >= MAX_IMAGES) { showToast('该时段图片已满'); captureInput.value = ''; return; }
    const parts = ck.split('-'), fid = parseInt(parts[0]), aname = parts[1], sidx = parseInt(parts[2]);
    const sName = getSeatNameSync(fid, aname, sidx);
    const bTime = getBeijingTime();
    const sk = cellToSeatKey(ck);

    // 【终极方案】同步绘制水印：拍照后立即生成带水印的缩略图和原图 Blob
    // 1. 读取文件为 DataURL
    const rawOriginal = await readFileAsDataURL(file);
    // 2. 同步绘制水印 + 导出 fullBlob 和 thumbBlob（一次 Canvas 绘制）
    const { fullBlob, thumbBlob } = await addWatermarkBlob(rawOriginal, sName, bTime);
    // 3. 生成 Blob URL 用于即时显示和预览
    const fullBlobURL = URL.createObjectURL(fullBlob);
    const thumbBlobURL = URL.createObjectURL(thumbBlob);
    // 4. 构建图片数据：缩略图用 Blob URL 显示，预览用 fullBlobURL
    const newImg = {
      data: '',              // Base64 水印图（后台异步填充）
      original: '',          // Base64 原图（后台异步填充）
      thumbnail: '',         // Base64 缩略图（后台异步填充）
      type: 'capture',
      createdAt: Date.now(),
      seatName: sName,
      beijingTime: bTime,
      // 【关键】Blob 缓存，预览和拼接直接使用，不依赖 IndexedDB
      _fullBlob: fullBlob,
      _thumbBlob: thumbBlob,
      _fullBlobURL: fullBlobURL,
      _thumbBlobURL: thumbBlobURL
    };
    images.push(newImg);
    // 5. 更新内存 Blob 缓存（预览时直接使用）
    cacheCellBlobs(ck, images);
    // 6. 存入 DB（data 为空，但 Blob URL 已在内存中可用于预览）
    await saveCellData(ck, images);
    imageCountCache.set(ck, images.length);
    state.seatHasImages.add(sk);
    invalidateTimeslotCache(sk);
    updateSeatVisual(sk);
    await renderTimeSlots(sk);
    updateBottomBar();

    // 7. 后台异步：将 Blob 转 Base64 存入 IndexedDB（不阻塞预览）
    const doStore = async () => {
      try {
        const [watermarked, thumbnail, original] = await Promise.all([
          blobToDataURL(fullBlob),
          blobToDataURL(thumbBlob),
          blobToDataURL(await compressImageBlob(rawOriginal, 0.95))
        ]);
        const cd = await getCellData(ck);
        if (cd && cd.images && cd.images.length > 0) {
          const lastIdx = cd.images.length - 1;
          cd.images[lastIdx].data = watermarked;
          cd.images[lastIdx].original = original;
          cd.images[lastIdx].thumbnail = thumbnail;
          await saveCellData(ck, cd.images);
          // 数据已持久化，刷新 DOM 缓存
          invalidateTimeslotCache(sk);
          await renderTimeSlots(sk);
        }
        // 自动分享
        if (state.autoShare) {
          const shareName = `${sName}_${bTime.replace(/[: ]/g, '-')}.jpg`;
          if (navigator.share && navigator.canShare) {
            const shareFile = new File([fullBlob], shareName, { type: 'image/jpeg' });
            if (navigator.canShare({ files: [shareFile] })) {
              try { await navigator.share({ files: [shareFile] }); } catch (err) { if (err.name !== 'AbortError') console.error('分享出错:', err); }
            } else { downloadBlob(fullBlob, shareName); }
          } else { downloadBlob(fullBlob, shareName); }
        }
      } catch (err) {
        console.error('后台存储出错:', err);
      }
    };
    if ('requestIdleCallback' in window) {
      requestIdleCallback(() => { doStore(); }, { timeout: 2000 });
    } else {
      setTimeout(doStore, 100);
    }
  } catch (err) {
    if (err.name === 'QuotaExceededError') showToast('存储空间不足！');
    else { console.error('拍照处理出错:', err); showToast('拍照处理出错'); }
  }
  captureInput.value = '';
});

uploadInput.addEventListener('change', async (e) => {
  const file = e.target.files[0];
  if (!file || !currentUploadCellKey) { uploadInput.value = ''; return; }
  const ck = currentUploadCellKey; currentUploadCellKey = null;

    const sName = getSeatNameSync(fid, aname, sidx);

      } catch (err) {

      }
    };
    if ('requestIdleCallback' in window) {
      requestIdleCallback(() => { doProcess(); }, { timeout: 2000 });
    } else {
      setTimeout(doProcess, 100);
    }
  } catch (err) {
    if (err.name === 'QuotaExceededError') showToast('存储空间不足！');
    else { console.error('上传处理出错:', err); showToast('上传处理出错'); }
  }
  uploadInput.value = '';
});

function dataURLtoBlob(dataurl) {
  const arr = dataurl.split(','), mime = arr[0].match(/:(.*?);/)[1], bstr = atob(arr[1]);
  const u8arr = new Uint8Array(bstr.length);
  for (let i = 0; i < bstr.length; i++) u8arr[i] = bstr.charCodeAt(i);
  return new Blob([u8arr], { type: mime });
}
/** 【性能优化】Blob → Base64 DataURL（仅在需要存入 IndexedDB 时才转换） */
function blobToDataURL(blob) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result);
    reader.onerror = () => reject(new Error('Blob 转 DataURL 失败'));
    reader.readAsDataURL(blob);
  });
}
function downloadBlob(blob, filename) {
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href = url; a.download = filename;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(url), 1000);
}

async function getProcessedData(imgObj, fid, aname, sidx) {
  let data = imgObj.data;
  if (imgObj.original) {
    const sName = getSeatNameSync(fid, aname, sidx);
    const bTime = imgObj.beijingTime || getBeijingTime();
    data = await addWatermark(imgObj.original, sName, bTime);
  }
  return data;
}

// 【优化】分享选中图片：批量读取选中数据，避免加载全部
async function shareSelectedImages() {
  if (state.selectedCells.length === 0) return;
  // 【性能优化】只读取选中的单元格数据
  const cellDataMap = await getCellDataBatch(state.selectedCells);
  // 【终极方案】分享时优先使用 Blob（拍照后可能 data 还未存入 IndexedDB）
  const allImgs = [];
  for (const ck of state.selectedCells) {
    const cellData = cellDataMap[ck];
    if (cellData && cellData.images) allImgs.push(...cellData.images);
  }
  // 检查是否所有图片都有可用数据（Blob URL 或 Base64 data）
  if (allImgs.some(img => !img._fullBlob && !img._fullBlobURL && !img.data)) { showToast('图片处理中，请稍后重试'); return; }

  const items = [];
  for (const ck of state.selectedCells) {
    const cellData = cellDataMap[ck];
    if (!cellData || !cellData.images || cellData.images.length === 0) continue;
    const parts = ck.split('-'), fid = parseInt(parts[0]), aname = parts[1], sidx = parseInt(parts[2]), tidx = parseInt(parts[3]);
    const sName = getSeatNameSync(fid, aname, sidx), timeSlot = TIME_SLOTS[tidx];
    for (let i = 0; i < cellData.images.length; i++) {
      // 优先使用 _fullBlob（已是水印图 Blob），回退到 data（Base64）
      const blob = cellData.images[i]._fullBlob || dataURLtoBlob(cellData.images[i].data);
      const filename = `${sName}_${timeSlot}_${i + 1}.jpg`;
      items.push({ blob, filename });
    }
  }
  if (items.length === 0) { showToast('无图片可分享'); return; }

  // 优先使用系统分享
  if (navigator.share && navigator.canShare) {
    const files = items.map(it => new File([it.blob], it.filename, { type: 'image/jpeg' }));
    if (navigator.canShare({ files })) {
      try { await navigator.share({ files }); return; }
      catch (err) { if (err.name === 'AbortError') return; }
    }
  }

  // 回退：单张直接下载，多张打包 zip
  if (items.length === 1) {
    downloadBlob(items[0].blob, items[0].filename);
    showToast('已开始下载');
  } else {
    showToast('正在打包...');
    try {
      const zip = new JSZip();
      items.forEach(it => zip.file(it.filename, it.blob));
      const zipBlob = await zip.generateAsync({ type: 'blob' });
      downloadBlob(zipBlob, `图片导出_${Date.now()}.zip`);
      showToast(`已下载 ${items.length} 张图片`);
    } catch (err) { console.error('打包出错:', err); showToast('打包出错'); }
  }
}

// 【修改1】拼接下载改为拼接预览：拼接后打开全屏预览，不直接下载
async function downloadConcatenated() {
  if (state.selectedCells.length === 0) return;
  // 拼接功能最多选择 2 个时段
  const uniqueTimeSlots = new Set(state.selectedCells.map(ck => ck.split('-')[3]));
  if (uniqueTimeSlots.size > 2) { showToast('拼接功能只能选择 2 个时段'); return; }
  try {
  // 【性能优化】只读取选中单元格的数据，不加载全部
  const cellDataMap = await getCellDataBatch(state.selectedCells);
  const allImageData = [];
  for (const ck of state.selectedCells) {
    const cellData = cellDataMap[ck];
    if (!cellData || !cellData.images || cellData.images.length === 0) continue;
    for (const imgObj of cellData.images) allImageData.push(imgObj);
  }
  if (allImageData.length === 0) { showToast('无图片可拼接'); return; }
  // 【终极方案】拼接时优先使用 Blob URL（拍照后可能 data 还未存入 IndexedDB）
  showToast('正在拼接...');
  // 构建图片源：优先 _fullBlobURL > _fullBlob(Blob) > data(Base64)
  const imgSrcs = allImageData.map((imgObj, idx) => {
    if (imgObj._fullBlobURL) return imgObj._fullBlobURL;
    if (imgObj._fullBlob) return URL.createObjectURL(imgObj._fullBlob);
    if (imgObj.data) return imgObj.data;
    return null;
  });
  if (imgSrcs.some(s => !s)) { showToast('部分图片尚未就绪，请稍后重试'); return; }
  const imgs = await Promise.all(imgSrcs.map(src => new Promise((r, j) => { const img = new Image(); img.onload = () => r(img); img.onerror = () => j(); img.src = src; })));
  const maxW = Math.max(...imgs.map(i => i.naturalWidth));
  const scaledH = imgs.map(i => Math.round(i.naturalHeight * maxW / i.naturalWidth));
  const totalH = scaledH.reduce((a, b) => a + b, 0);
  const canvas = document.createElement('canvas'); canvas.width = maxW; canvas.height = totalH;
  const ctx = canvas.getContext('2d'); ctx.fillStyle = '#fff'; ctx.fillRect(0, 0, maxW, totalH);
  let y = 0;
  for (let i = 0; i < imgs.length; i++) { ctx.drawImage(imgs[i], 0, y, maxW, scaledH[i]); y += scaledH[i]; }
  // 【修复】拼接预览模糊：使用 Blob URL 替代 dataURL，避免浏览器对超大 dataURL 降质渲染
  const blob = await new Promise(resolve => canvas.toBlob(resolve, 'image/jpeg', 0.95));
  const blobURL = URL.createObjectURL(blob);
  showPreviewFromBlobURL(blobURL, blob, '拼接结果');
  } catch (err) {
    console.error('拼接预览出错:', err);
    showToast('拼接出错: ' + (err.message || '未知错误'));
  }
}

const batchModal = document.getElementById('batch-modal');
const batchAreasDiv = document.getElementById('batch-areas');
const batchTimesDiv = document.getElementById('batch-times');
let batchSelectedAreas = new Set(), batchSelectedTimes = new Set();

async function initBatchModal() {
  batchSelectedAreas = new Set(); batchSelectedTimes = new Set();
  // 【性能优化】从计数缓存扫描有图片的区域和时段，不加载完整图片数据
  const areasWithImages = new Set();
  const timesWithImages = new Set();
  imageCountCache.forEach((cnt, key) => {
    if (cnt > 0) {
      const p = key.split('-');
      areasWithImages.add(`${p[0]}-${p[1]}`);
      timesWithImages.add(parseInt(p[3]));
    }
  });
  let ahtml = '';
  FLOORS.forEach(floor => {
    floor.areas.forEach(area => {
      const ak = areaKey(floor.id, area.name);
      if (!areasWithImages.has(ak)) return; // 跳过无图片的区域
      ahtml += `<div class="batch-chip" data-ak="${ak}">${floor.name}${area.name}</div>`;
    });
  });
  batchAreasDiv.innerHTML = ahtml;
  let thtml = '';
  TIME_SLOTS.forEach((ts, idx) => {
    if (!timesWithImages.has(idx)) return; // 跳过无图片的时段
    thtml += `<div class="batch-chip" data-tidx="${idx}">${ts}</div>`;
  });
  batchTimesDiv.innerHTML = thtml;
}

batchModal.addEventListener('click', (e) => {
  const chip = e.target.closest('.batch-chip');
  if (chip) {
    chip.classList.toggle('checked');
    if (chip.dataset.ak) { chip.classList.contains('checked') ? batchSelectedAreas.add(chip.dataset.ak) : batchSelectedAreas.delete(chip.dataset.ak); }
    if (chip.dataset.tidx !== undefined) { const ti = chip.dataset.tidx; chip.classList.contains('checked') ? batchSelectedTimes.add(ti) : batchSelectedTimes.delete(ti); }
    return;
  }
  const selAll = e.target.closest('.batch-select-all');
  if (selAll) {
    const target = selAll.dataset.target;
    const container = target === 'area' ? batchAreasDiv : batchTimesDiv;
    const chips = container.querySelectorAll('.batch-chip');
    const allChecked = [...chips].every(c => c.classList.contains('checked'));
    chips.forEach(c => {
      if (allChecked) { c.classList.remove('checked'); if (c.dataset.ak) batchSelectedAreas.delete(c.dataset.ak); if (c.dataset.tidx !== undefined) batchSelectedTimes.delete(c.dataset.tidx); }
      else { c.classList.add('checked'); if (c.dataset.ak) batchSelectedAreas.add(c.dataset.ak); if (c.dataset.tidx !== undefined) batchSelectedTimes.add(c.dataset.tidx); }
    });
  }
});

document.getElementById('batch-cancel').addEventListener('click', () => batchModal.classList.remove('show'));
document.getElementById('batch-exec').addEventListener('click', async () => {
  if (batchSelectedAreas.size === 0 || batchSelectedTimes.size === 0) { showToast('请选择区域和时段'); return; }
  batchModal.classList.remove('show'); showToast('正在打包...');
  try {
    // 【性能优化】只收集需要的 key，批量读取，不加载全部图片
    const neededKeys = [];
    for (const ak of batchSelectedAreas) {
      const parts = ak.split('-'), fid = parseInt(parts[0]), aname = parts[1];
      const seatCount = getAreaSeatCount(fid, aname);
      for (const tidx of batchSelectedTimes) {
        const tIdx = parseInt(tidx);
        for (let sidx = 0; sidx < seatCount; sidx++) {
          const sk = seatKey(fid, aname, sidx);
          if (state.deletedSeats.has(sk)) continue;
          neededKeys.push(cellKey(fid, aname, sidx, tIdx));
        }
      }
    }
    const cellDataMap = await getCellDataBatch(neededKeys);
    const zip = new JSZip(); let count = 0;
    for (const ak of batchSelectedAreas) {
      const parts = ak.split('-'), fid = parseInt(parts[0]), aname = parts[1];
      const seatCount = getAreaSeatCount(fid, aname);
      const floorObj = FLOORS.find(f => f.id === fid);
      for (const tidx of batchSelectedTimes) {
        const tIdx = parseInt(tidx);
        for (let sidx = 0; sidx < seatCount; sidx++) {
          const sk = seatKey(fid, aname, sidx);
          if (state.deletedSeats.has(sk)) continue;
          const ck = cellKey(fid, aname, sidx, tIdx);
          const cellData = cellDataMap[ck];
          if (!cellData) continue;
          const sName = getSeatNameSync(fid, aname, sidx);
          for (let i = 0; i < cellData.images.length; i++) {
            // 【修改3】直接用已存储的 data，不额外叠加水印
            const folder = `${floorObj.name}_${aname}`;
            zip.folder(folder).file(`${sName}_${TIME_SLOTS[tIdx]}_${i + 1}.jpg`, dataURLtoBlob(cellData.images[i].data));
            count++;
          }
        }
      }
    }
    if (count === 0) { showToast('所选范围内无图片'); return; }
    const blob = await zip.generateAsync({ type: 'blob' });
    downloadBlob(blob, `批量下载_${count}张.zip`);
    showToast(`已下载 ${count} 张图片`);
  } catch (err) { console.error('批量下载出错:', err); showToast('下载出错'); }
});
