<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>图书馆座位分时段图片管理</title>
<style>
/* ===== 基础重置 ===== */
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;font-size:15px;color:#333;background:#f0f2f5;-webkit-tap-highlight-color:transparent}
#app{max-width:480px;margin:0 auto;padding:12px 10px 100px;min-height:100vh}

/* ===== 页面标题栏 ===== */
.page-header{display:flex;align-items:center;justify-content:center;padding:14px 0 10px;gap:10px}
.page-title{font-size:20px;font-weight:700;color:#1a1a1a;letter-spacing:1px}
.btn-cleanup{padding:6px 14px;font-size:13px;font-weight:600;border:none;border-radius:6px;background:#ff4d4f;color:#fff;cursor:pointer;white-space:nowrap}
.btn-cleanup:active{opacity:.7}

/* ===== 楼层按钮 ===== */
.floor-btn{display:block;width:100%;padding:16px 20px;margin:8px 0;font-size:18px;font-weight:600;border:none;border-radius:10px;color:#fff;cursor:pointer;text-align:left;position:relative;transition:transform .1s}
.floor-btn:active{transform:scale(.97)}
.floor-btn .arrow{float:right;font-size:14px;transition:transform .25s}
.floor-btn.expanded .arrow{transform:rotate(90deg)}
.floor-1{background:linear-gradient(135deg,#667eea,#764ba2)}
.floor-2{background:linear-gradient(135deg,#f093fb,#f5576c)}
.floor-3{background:linear-gradient(135deg,#4facfe,#00f2fe)}
.floor-4{background:linear-gradient(135deg,#43e97b,#38f9d7)}
.floor-5{background:linear-gradient(135deg,#fa709a,#fee140)}

/* ===== 区域按钮容器 ===== */
.area-container{display:none;padding:4px 0 8px 16px}
.area-container.show{display:block}

/* ===== 区域按钮 ===== */
.area-btn{display:inline-block;padding:12px 20px;margin:5px 4px;font-size:16px;font-weight:600;border:none;border-radius:8px;background:#fff;color:#333;cursor:pointer;box-shadow:0 1px 4px rgba(0,0,0,.12);position:relative;transition:transform .1s}
.area-btn:active{transform:scale(.95)}
.area-btn .arrow{margin-left:6px;font-size:12px;transition:transform .25s}
.area-btn.expanded .arrow{transform:rotate(90deg)}

/* ===== 座位容器 ===== */
.seat-container{display:none;padding:8px 0}
.seat-container.show{display:block}

/* ===== 座位流式布局（flex-wrap，时间段紧跟座位按钮） ===== */
.seat-flow{display:flex;flex-wrap:wrap;gap:6px;padding:0 2px}
.seat-btn{width:calc(20% - 5px);padding:10px 2px;font-size:13px;font-weight:500;border:2px solid #d9d9d9;border-radius:6px;background:#fff;cursor:pointer;text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;transition:background .15s,border-color .15s}
.seat-btn:active{background:#e6f7ff}
.seat-btn.expanded{background:#e6f7ff;border-color:#1890ff}

/* ===== 有图片的座位视觉提示 ===== */
.seat-btn.has-images{border-color:#52c41a;background:linear-gradient(135deg,#f6ffed,#d9f7be);color:#389e0d;font-weight:700}
.seat-btn.has-images.expanded{border-color:#1890ff;background:#e6f7ff;color:#333;font-weight:500}

/* ===== 新增座位按钮 ===== */
.add-seat-btn{width:calc(20% - 5px);padding:10px 2px;font-size:20px;font-weight:700;border:2px dashed #bfbfbf;border-radius:6px;background:#fafafa;cursor:pointer;text-align:center;color:#8c8c8c;transition:all .15s}
.add-seat-btn:active{background:#e6f7ff;border-color:#1890ff;color:#1890ff}

/* ===== 时间段卡片容器（宽度100%，紧跟对应座位按钮） ===== */
.timeslot-container{display:none;width:100%;padding:8px 0}
.timeslot-container.show{display:block}

/* ===== 座位名称编辑区 ===== */
.seat-header{display:flex;align-items:center;padding:8px 4px 10px;gap:8px;flex-wrap:wrap}
.seat-header-label{font-size:15px;color:#666}
.seat-name-text{font-size:17px;font-weight:700;color:#1890ff;cursor:pointer;border-bottom:1px dashed #1890ff;padding-bottom:1px}
.seat-name-hint{font-size:12px;color:#999;margin-left:4px}
.seat-name-edit-input{font-size:17px;font-weight:700;color:#1890ff;border:none;border-bottom:2px solid #1890ff;outline:none;background:transparent;width:120px;padding-bottom:1px}
.btn-delete-seat{padding:4px 12px;font-size:12px;font-weight:600;border:1px solid #ff4d4f;border-radius:4px;background:#fff;color:#ff4d4f;cursor:pointer;margin-left:auto}
.btn-delete-seat:active{background:#fff1f0}

/* ===== 时间段卡片 ===== */
.timeslot-card{background:#fff;border-radius:8px;margin:8px 0;padding:10px 10px 8px;box-shadow:0 1px 3px rgba(0,0,0,.08);position:relative}
.ts-top{display:flex;align-items:center;gap:8px}
.ts-checkbox{width:22px;height:22px;border-radius:50%;border:2px solid #bbb;background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s}
.ts-checkbox.checked{background:#1890ff;border-color:#1890ff}
.ts-checkbox.checked::after{content:'✓';color:#fff;font-size:14px;font-weight:700}
.ts-time{font-size:16px;font-weight:600;color:#333}
.ts-btns{display:flex;gap:8px;margin:8px 0 4px 10px}
.ts-btn{padding:8px 16px;font-size:14px;font-weight:500;border:none;border-radius:6px;cursor:pointer;transition:opacity .15s}
.ts-btn:active{opacity:.7}
.ts-btn-capture{background:#1890ff;color:#fff}
.ts-btn-upload{background:#52c41a;color:#fff}
.ts-btn:disabled{opacity:.4;cursor:not-allowed}
.ts-thumbs{display:flex;gap:8px;flex-wrap:wrap;margin-top:6px;padding-left:10px}
.thumb-wrap{position:relative;width:80px;height:80px;border-radius:6px;overflow:hidden;border:1px solid #e8e8e8;flex-shrink:0}
.thumb-wrap img{width:100%;height:100%;object-fit:cover;cursor:pointer}
.thumb-del{position:absolute;top:2px;right:2px;width:22px;height:22px;border-radius:50%;background:rgba(0,0,0,.55);color:#fff;font-size:14px;line-height:22px;text-align:center;cursor:pointer;z-index:2}
.thumb-del:active{background:rgba(255,0,0,.7)}

/* ===== 底部操作栏 ===== */
#bottom-bar{display:none;position:fixed;bottom:0;left:0;right:0;background:#fff;box-shadow:0 -2px 8px rgba(0,0,0,.12);padding:10px 12px;z-index:100;max-width:480px;margin:0 auto;flex-wrap:wrap}
#bottom-bar.show{display:flex;align-items:center;gap:8px}
#selected-count{font-size:13px;color:#666;flex-shrink:0;white-space:nowrap}
#btn-clear-select{padding:8px 12px;font-size:13px;border:1px solid #d9d9d9;border-radius:6px;background:#fff;color:#666;cursor:pointer;flex-shrink:0}
#btn-clear-select:active{background:#f5f5f5}
.bar-btn{padding:12px 14px;font-size:14px;font-weight:600;border:none;border-radius:8px;cursor:pointer;flex:1;min-width:0;white-space:nowrap}
.bar-btn:active{opacity:.8}
#btn-download-separate{background:#1890ff;color:#fff}
#btn-download-concat{background:#fa8c16;color:#fff}

/* ===== 全屏预览弹窗 ===== */
#preview-modal{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.92);z-index:200;overflow:hidden;touch-action:none}
#preview-modal.show{display:block}
#preview-close{position:absolute;top:12px;right:16px;font-size:32px;color:#fff;cursor:pointer;z-index:201;width:44px;height:44px;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.3);border-radius:50%}
#preview-image-wrap{position:absolute;top:0;left:0;right:0;bottom:0;display:flex;align-items:center;justify-content:center;overflow:hidden}
#preview-image{max-width:95vw;max-height:90vh;object-fit:contain;border-radius:4px;transform-origin:0 0;transition:none}
#preview-hint{position:absolute;bottom:20px;left:50%;transform:translateX(-50%);color:rgba(255,255,255,.5);font-size:12px;pointer-events:none}

/* ===== 批量清理弹窗 ===== */
#cleanup-modal{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);z-index:250;align-items:center;justify-content:center}
#cleanup-modal.show{display:flex}
.cleanup-box{background:#fff;border-radius:12px;padding:24px 20px;width:90%;max-width:360px;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%)}
.cleanup-box h3{font-size:18px;margin-bottom:16px;text-align:center}
.cleanup-box p{font-size:14px;color:#666;margin-bottom:12px}
.cleanup-date-row{display:flex;gap:10px;margin-bottom:20px;justify-content:center}
.cleanup-field{display:flex;flex-direction:column;align-items:center;gap:6px}
.cleanup-field label{font-size:13px;color:#999}
.cleanup-stepper{display:flex;align-items:center;gap:0;border:1px solid #d9d9d9;border-radius:6px;overflow:hidden}
.cleanup-stepper button{width:40px;height:44px;font-size:22px;font-weight:700;border:none;background:#f5f5f5;color:#333;cursor:pointer;-webkit-user-select:none;user-select:none}
.cleanup-stepper button:active{background:#e0e0e0}
.cleanup-stepper span{width:56px;height:44px;line-height:44px;text-align:center;font-size:18px;font-weight:700;background:#fff}
.cleanup-btns{display:flex;gap:10px}
.cleanup-btns button{flex:1;padding:12px;font-size:15px;font-weight:600;border:none;border-radius:8px;cursor:pointer}
.cleanup-btns button:active{opacity:.8}
.cleanup-cancel{background:#f0f0f0;color:#333}
.cleanup-exec{background:#ff4d4f;color:#fff}

/* ===== 提示信息 ===== */
.toast{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(0,0,0,.75);color:#fff;padding:14px 28px;border-radius:8px;font-size:15px;z-index:300;pointer-events:none;animation:toast-fade 2s forwards}
@keyframes toast-fade{0%{opacity:1}70%{opacity:1}100%{opacity:0}}
</style>
</head>
<body>

<div id="app"></div>

<!-- 底部操作栏 -->
<div id="bottom-bar">
  <span id="selected-count">已选 0 个时段</span>
  <button id="btn-clear-select">取消全选</button>
  <button class="bar-btn" id="btn-download-separate">分别下载</button>
  <button class="bar-btn" id="btn-download-concat">拼接下载</button>
</div>

<!-- 全屏预览弹窗 -->
<div id="preview-modal">
  <div id="preview-close">&times;</div>
  <div id="preview-image-wrap">
    <img id="preview-image" />
  </div>
  <div id="preview-hint">双指缩放 · 单指拖动 · 点击空白关闭</div>
</div>

<!-- 批量清理弹窗 -->
<div id="cleanup-modal">
  <div class="cleanup-box">
    <h3>批量清理图片</h3>
    <p>删除所选日期<strong>之前</strong>添加的所有图片，释放存储空间。</p>
    <div class="cleanup-date-row">
      <div class="cleanup-field">
        <label>年</label>
        <div class="cleanup-stepper">
          <button data-action="step-year-down">−</button>
          <span id="cleanup-year-val">2026</span>
          <button data-action="step-year-up">+</button>
        </div>
      </div>
      <div class="cleanup-field">
        <label>月</label>
        <div class="cleanup-stepper">
          <button data-action="step-month-down">−</button>
          <span id="cleanup-month-val">6</span>
          <button data-action="step-month-up">+</button>
        </div>
      </div>
      <div class="cleanup-field">
        <label>日</label>
        <div class="cleanup-stepper">
          <button data-action="step-day-down">−</button>
          <span id="cleanup-day-val">10</span>
          <button data-action="step-day-up">+</button>
        </div>
      </div>
    </div>
    <div class="cleanup-btns">
      <button class="cleanup-cancel" id="cleanup-cancel-btn">取消</button>
      <button class="cleanup-exec" id="cleanup-exec-btn">执行清理</button>
    </div>
  </div>
</div>

<script>
// ============================================================
// 一、常量与配置
// ============================================================

const FLOORS = [
  { id: 1, name: '一楼', areas: ['中庭', '报刊'] },
  { id: 2, name: '二楼', areas: ['东', '南', '西', '北', '青少年'] },
  { id: 3, name: '三楼', areas: ['东', '南', '西', '北'] },
  { id: 4, name: '四楼', areas: ['东', '南', '西', '北'] },
  { id: 5, name: '五楼', areas: ['东', '南', '西'] }
];

const TIME_SLOTS = [
  '09:00','09:30','10:00','10:30','11:00','12:00',
  '13:00','13:30','14:00','14:30','15:00','15:30',
  '16:00','16:30','17:00','18:00','18:30','19:00',
  '19:30','20:00','20:30','21:00'
];

const DEFAULT_SEAT_COUNT = 90;
const MAX_IMAGES = 3;
const DB_NAME = 'SeatImageDB';
const DB_VERSION = 3;

// ============================================================
// 二、IndexedDB 数据库操作
// ============================================================

let dbInstance = null;

function openDB() {
  if (dbInstance) return Promise.resolve(dbInstance);
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NAME, DB_VERSION);
    req.onupgradeneeded = (e) => {
      const db = e.target.result;
      if (!db.objectStoreNames.contains('cells')) db.createObjectStore('cells', { keyPath: 'key' });
      if (!db.objectStoreNames.contains('seatNames')) db.createObjectStore('seatNames', { keyPath: 'key' });
      if (!db.objectStoreNames.contains('areaSeatCount')) db.createObjectStore('areaSeatCount', { keyPath: 'key' });
      if (!db.objectStoreNames.contains('deletedSeats')) db.createObjectStore('deletedSeats', { keyPath: 'key' });
    };
    req.onsuccess = (e) => { dbInstance = e.target.result; resolve(dbInstance); };
    req.onerror = (e) => reject(e.target.error);
  });
}

async function dbPut(storeName, data) {
  const db = await openDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(storeName, 'readwrite');
    tx.objectStore(storeName).put(data);
    tx.oncomplete = () => resolve();
    tx.onerror = (e) => reject(e.target.error);
  });
}

async function dbGet(storeName, key) {
  const db = await openDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(storeName, 'readonly');
    const req = tx.objectStore(storeName).get(key);
    req.onsuccess = () => resolve(req.result || null);
    req.onerror = (e) => reject(e.target.error);
  });
}

async function dbDelete(storeName, key) {
  const db = await openDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(storeName, 'readwrite');
    tx.objectStore(storeName).delete(key);
    tx.oncomplete = () => resolve();
    tx.onerror = (e) => reject(e.target.error);
  });
}

async function dbGetAll(storeName) {
  const db = await openDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(storeName, 'readonly');
    const req = tx.objectStore(storeName).getAll();
    req.onsuccess = () => resolve(req.result);
    req.onerror = (e) => reject(e.target.error);
  });
}

async function dbClearStore(storeName) {
  const db = await openDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(storeName, 'readwrite');
    tx.objectStore(storeName).clear();
    tx.oncomplete = () => resolve();
    tx.onerror = (e) => reject(e.target.error);
  });
}

async function saveCellData(cellKey, images) { await dbPut('cells', { key: cellKey, images }); }
async function getCellData(cellKey) { return await dbGet('cells', cellKey); }
async function saveSeatName(sk, name) { await dbPut('seatNames', { key: sk, name }); }
async function getAllSeatNames() { const all = await dbGetAll('seatNames'); const m = {}; all.forEach(r => m[r.key] = r.name); return m; }
async function saveAreaSeatCount(ak, count) { await dbPut('areaSeatCount', { key: ak, count }); }
async function getAllAreaSeatCounts() { const all = await dbGetAll('areaSeatCount'); const m = {}; all.forEach(r => m[r.key] = r.count); return m; }
async function saveDeletedSeat(sk) { await dbPut('deletedSeats', { key: sk }); }
async function removeDeletedSeat(sk) { await dbDelete('deletedSeats', sk); }
async function getAllDeletedSeats() { const all = await dbGetAll('deletedSeats'); return new Set(all.map(r => r.key)); }

// ============================================================
// 三、应用状态管理
// ============================================================

const state = {
  expandedFloors: new Set(),
  expandedAreas: new Set(),
  expandedSeats: new Set(),
  selectedCells: [],
  seatNames: {},
  seatHasImages: new Set(),
  areaSeatCounts: {},
  deletedSeats: new Set(),
};

function areaKey(fid, aname) { return `${fid}-${aname}`; }
function seatKey(fid, aname, idx) { return `${fid}-${aname}-${idx}`; }
function cellKey(fid, aname, sidx, tidx) { return `${fid}-${aname}-${sidx}-${tidx}`; }
function cellToSeatKey(ck) { return ck.split('-').slice(0, 3).join('-'); }

function getAreaSeatCount(fid, aname) {
  return state.areaSeatCounts[areaKey(fid, aname)] || DEFAULT_SEAT_COUNT;
}

function defaultSeatName(fid, aname, idx) {
  return `${aname}${fid}${String(idx + 1).padStart(3, '0')}`;
}

function getSeatNameSync(fid, aname, idx) {
  const sk = seatKey(fid, aname, idx);
  return state.seatNames[sk] || defaultSeatName(fid, aname, idx);
}

async function buildSeatHasImages() {
  const all = await dbGetAll('cells');
  state.seatHasImages = new Set();
  all.forEach(r => {
    if (r.images && r.images.length > 0) {
      state.seatHasImages.add(r.key.split('-').slice(0, 3).join('-'));
    }
  });
}

function saveUIState() {
  try {
    localStorage.setItem('seat_ui_state', JSON.stringify({
      expandedFloors: [...state.expandedFloors],
      expandedAreas: [...state.expandedAreas],
      expandedSeats: [...state.expandedSeats]
    }));
  } catch (e) {}
}

function loadUIState() {
  try {
    const raw = localStorage.getItem('seat_ui_state');
    if (!raw) return;
    const obj = JSON.parse(raw);
    if (obj.expandedFloors) state.expandedFloors = new Set(obj.expandedFloors);
    if (obj.expandedAreas) state.expandedAreas = new Set(obj.expandedAreas);
    if (obj.expandedSeats) state.expandedSeats = new Set(obj.expandedSeats);
  } catch (e) {}
}

// ============================================================
// 四、UI 渲染
// ============================================================

const app = document.getElementById('app');

function renderMain() {
  let html = '<div class="page-header"><span class="page-title">图书馆座位图片管理</span><button class="btn-cleanup" data-action="open-cleanup">批量清理</button></div>';
  FLOORS.forEach(floor => {
    const fid = floor.id;
    const expanded = state.expandedFloors.has(fid);
    html += `<button class="floor-btn floor-${fid} ${expanded ? 'expanded' : ''}" data-action="toggle-floor" data-floor="${fid}">${floor.name}<span class="arrow">▶</span></button>`;
    html += `<div class="area-container ${expanded ? 'show' : ''}" id="areas-${fid}">`;
    floor.areas.forEach(aname => {
      const ak = areaKey(fid, aname);
      const aExpanded = state.expandedAreas.has(ak);
      html += `<button class="area-btn ${aExpanded ? 'expanded' : ''}" data-action="toggle-area" data-floor="${fid}" data-area="${aname}">${aname}<span class="arrow">▶</span></button>`;
      html += `<div class="seat-container ${aExpanded ? 'show' : ''}" id="seats-${ak}">`;
      html += renderSeatFlow(fid, aname);
      html += `</div>`;
    });
    html += `</div>`;
  });
  app.innerHTML = html;
  state.expandedSeats.forEach(sk => renderTimeSlots(sk));
}

/** 渲染座位流（每个座位按钮紧跟其时间段容器） */
function renderSeatFlow(fid, aname) {
  const count = getAreaSeatCount(fid, aname);
  let html = '<div class="seat-flow">';
  for (let i = 0; i < count; i++) {
    const sk = seatKey(fid, aname, i);
    // 跳过已删除的座位
    if (state.deletedSeats.has(sk)) continue;
    const sName = getSeatNameSync(fid, aname, i);
    const sExpanded = state.expandedSeats.has(sk);
    const hasImg = state.seatHasImages.has(sk);
    // 座位按钮
    html += `<button class="seat-btn ${sExpanded ? 'expanded' : ''} ${hasImg ? 'has-images' : ''}" data-action="toggle-seat" data-floor="${fid}" data-area="${aname}" data-seat="${i}">${sName}</button>`;
    // 时间段容器紧跟其后（宽度100%，展开时占据整行）
    html += `<div class="timeslot-container ${sExpanded ? 'show' : ''}" id="timeslots-${sk}"></div>`;
  }
  // 新增座位按钮
  html += `<button class="add-seat-btn" data-action="add-seat" data-floor="${fid}" data-area="${aname}">+</button>`;
  html += '</div>';
  return html;
}

/** 渲染某个座位的时间段卡片 */
async function renderTimeSlots(sk) {
  const container = document.getElementById('timeslots-' + sk);
  if (!container) return;
  const parts = sk.split('-');
  const fid = parseInt(parts[0]);
  const aname = parts[1];
  const sidx = parseInt(parts[2]);
  const sName = getSeatNameSync(fid, aname, sidx);

  let html = `<div class="seat-header">`;
  html += `<span class="seat-header-label">座位编号：</span>`;
  html += `<span class="seat-name-text" data-action="edit-seat-name" data-seat-key="${sk}">${sName}</span>`;
  html += `<span class="seat-name-hint">（点击修改）</span>`;
  html += `<button class="btn-delete-seat" data-action="delete-seat" data-seat-key="${sk}">删除座位</button>`;
  html += `</div>`;

  for (let t = 0; t < TIME_SLOTS.length; t++) {
    const ck = cellKey(fid, aname, sidx, t);
    const cellData = await getCellData(ck);
    const images = (cellData && cellData.images) ? cellData.images : [];
    const isFull = images.length >= MAX_IMAGES;
    const isSelected = state.selectedCells.includes(ck);

    html += `<div class="timeslot-card">`;
    html += `<div class="ts-top">`;
    html += `<div class="ts-checkbox ${isSelected ? 'checked' : ''}" data-action="toggle-select" data-cell-key="${ck}"></div>`;
    html += `<span class="ts-time">${TIME_SLOTS[t]}</span>`;
    html += `</div>`;
    html += `<div class="ts-btns">`;
    html += `<button class="ts-btn ts-btn-capture" ${isFull ? 'disabled' : ''} data-action="capture" data-cell-key="${ck}">拍照</button>`;
    html += `<button class="ts-btn ts-btn-upload" ${isFull ? 'disabled' : ''} data-action="upload" data-cell-key="${ck}">上传</button>`;
    html += `</div>`;
    if (images.length > 0) {
      html += `<div class="ts-thumbs">`;
      images.forEach((img, idx) => {
        html += `<div class="thumb-wrap">`;
        html += `<img src="${img.data}" data-action="preview" data-cell-key="${ck}" data-img-idx="${idx}" />`;
        html += `<div class="thumb-del" data-action="delete-img" data-cell-key="${ck}" data-img-idx="${idx}">&times;</div>`;
        html += `</div>`;
      });
      html += `</div>`;
    }
    html += `</div>`;
  }
  container.innerHTML = html;
}

/** 更新某个座位按钮的视觉提示 */
function updateSeatVisual(sk) {
  document.querySelectorAll('.seat-btn').forEach(btn => {
    const k = seatKey(parseInt(btn.dataset.floor), btn.dataset.area, parseInt(btn.dataset.seat));
    if (k !== sk) return;
    btn.classList.toggle('has-images', state.seatHasImages.has(sk));
  });
}

// ============================================================
// 五、图片水印
// ============================================================

/** 添加水印（左下角，座位编号，80px，白色文本+半透明圆角背景，无描边） */
function addWatermark(imageData, seatName) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.onload = () => {
      const canvas = document.createElement('canvas');
      canvas.width = img.naturalWidth;
      canvas.height = img.naturalHeight;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0);
      const fontSize = 80;
      const padding = 16;
      ctx.font = `bold ${fontSize}px sans-serif`;
      const tw = ctx.measureText(seatName).width;
      const th = fontSize;
      const x = padding;
      const y = canvas.height - th - padding * 2;
      // 半透明圆角背景
      const bgX = x - padding, bgY = y - padding, bgW = tw + padding * 2, bgH = th + padding * 2, r = 12;
      ctx.fillStyle = 'rgba(0,0,0,0.5)';
      ctx.beginPath();
      ctx.moveTo(bgX + r, bgY);
      ctx.lineTo(bgX + bgW - r, bgY);
      ctx.quadraticCurveTo(bgX + bgW, bgY, bgX + bgW, bgY + r);
      ctx.lineTo(bgX + bgW, bgY + bgH - r);
      ctx.quadraticCurveTo(bgX + bgW, bgY + bgH, bgX + bgW - r, bgY + bgH);
      ctx.lineTo(bgX + r, bgY + bgH);
      ctx.quadraticCurveTo(bgX, bgY + bgH, bgX, bgY + bgH - r);
      ctx.lineTo(bgX, bgY + r);
      ctx.quadraticCurveTo(bgX, bgY, bgX + r, bgY);
      ctx.closePath();
      ctx.fill();
      // 白色文本
      ctx.textBaseline = 'top';
      ctx.fillStyle = '#ffffff';
      ctx.fillText(seatName, x, y);
      resolve(canvas.toDataURL('image/jpeg', 1.0));
    };
    img.onerror = () => reject(new Error('图片加载失败'));
    img.src = imageData;
  });
}

const captureInput = document.createElement('input');

let currentCaptureCellKey = null;
let currentUploadCellKey = null;

function readFileAsDataURL(file) {
  return new Promise((resolve, reject) => {
    const r = new FileReader();
    r.onload = () => resolve(r.result);
    r.onerror = () => reject(r.error);
    r.readAsDataURL(file);
  });
}

/** 处理拍照 */
captureInput.addEventListener('change', async (e) => {
  const file = e.target.files[0];
  if (!file || !currentCaptureCellKey) { captureInput.value = ''; return; }

    const original = await readFileAsDataURL(file);

    const sName = getSeatNameSync(fid, aname, sidx);

    images.push({ data: watermarked, original, type: 'capture', createdAt: Date.now() });
    await saveCellData(ck, images);
    const sk = cellToSeatKey(ck);
    state.seatHasImages.add(sk);
    updateSeatVisual(sk);
    await renderTimeSlots(sk);
  } catch (err) {
    if (err.name === 'QuotaExceededError') showToast('存储空间不足，请删除一些旧图片后再试！');
    else { console.error('拍照处理出错:', err); showToast('拍照处理出错，请重试'); }
  }
  captureInput.value = '';
});

// ============================================================
// 七、下载功能
// ============================================================

function downloadDataUrl(dataUrl, filename) {
  const a = document.createElement('a');
  a.href = dataUrl; a.download = filename;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
}

function loadImage(src) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.onload = () => resolve(img);
    img.onerror = () => reject(new Error('图片加载失败'));
    img.src = src;
  });
}

/** 分别下载 */
async function downloadIndividually() {
  if (state.selectedCells.length === 0) return;
  let delay = 0;
  for (const ck of state.selectedCells) {
    const cellData = await getCellData(ck);
    if (!cellData || !cellData.images || !cellData.images.length === 0) continue;
    const parts = ck.split('-');
    const fid = parseInt(parts[0]), aname = parts[1], sidx = parseInt(parts[2]), tidx = parseInt(parts[3]);
    const sName = getSeatNameSync(fid, aname, sidx);
    const timeSlot = TIME_SLOTS[tidx];
    for (let i = 0; i < cellData.images.length; i++) {
      const imgObj = cellData.images[i];
      let data = imgObj.data;
      if (imgObj.original) data = await addWatermark(imgObj.original, getSeatNameSync(fid, aname, sidx));
      const filename = `${sName}_${timeSlot}_${i + 1}.jpg`;
      setTimeout(() => downloadDataUrl(data, filename), delay);
      delay += 400;
    }
  }
  showToast('已开始下载');
}

/** 拼接下载 */
async function downloadConcatenated() {
  if (state.selectedCells.length === 0) return;
  const allImageData = [];
  for (const ck of state.selectedCells) {
    const cellData = await getCellData(ck);
    if (!cellData || !cellData.images || cellData.images.length === 0) continue;
    const parts = ck.split('-');
    const fid = parseInt(parts[0]), aname = parts[1], sidx = parseInt(parts[2]);
    for (const imgObj of cellData.images) allImageData.push({ ...imgObj, fid, aname, sidx });
  }
  if (allImageData.length === 0) { showToast('无图片可拼接'); return; }
  const processedImages = [];
  for (const imgObj of allImageData) {
    let data = imgObj.data;
    if (imgObj.original) data = await addWatermark(imgObj.original, getSeatNameSync(imgObj.fid, imgObj.aname, imgObj.sidx));
    processedImages.push(data);
  }
  const imgs = await Promise.all(processedImages.map(loadImage));
  const maxWidth = Math.max(...imgs.map(img => img.naturalWidth));
  const scaledHeights = imgs.map(img => Math.round(img.naturalHeight * maxWidth / img.naturalWidth));
  const totalHeight = scaledHeights.reduce((a, b) => a + b, 0);
  const canvas = document.createElement('canvas');
  canvas.width = maxWidth; canvas.height = totalHeight;
  const ctx = canvas.getContext('2d');
  ctx.fillStyle = '#ffffff'; ctx.fillRect(0, 0, maxWidth, totalHeight);
  let y = 0;
  for (let i = 0; i < imgs.length; i++) { ctx.drawImage(imgs[i], 0, y, maxWidth, scaledHeights[i]); y += scaledHeights[i]; }
  const ts = new Date().toLocaleString('zh-CN', { timeZone: 'Asia/Shanghai', hour12: false }).replace(/[\/:]/g, '').replace(/\s/g, '_');
  downloadDataUrl(canvas.toDataURL('image/jpeg', 0.92), `拼接结果_${ts}.jpg`);
  showToast('拼接下载完成');
}

// ============================================================
// 八、全屏预览（双指缩放：缩放中心跟随手指中点）
// ============================================================

const previewModal = document.getElementById('preview-modal');
const previewImage = document.getElementById('preview-image');
const previewClose = document.getElementById('preview-close');
const previewWrap = document.getElementById('preview-image-wrap');

let pvScale = 1, pvTX = 0, pvTY = 0;
let pvLastDist = 0, pvLastX = 0, pvLastY = 0;
let pvDragging = false, pvPinching = false;

function pvApply() {
  previewImage.style.transform = `translate(${pvTX}px, ${pvTY}px) scale(${pvScale})`;
}

function pvReset() { pvScale = 1; pvTX = 0; pvTY = 0; pvApply(); }

async function showPreview(cellKeyStr, imgIdx) {
  const cellData = await getCellData(cellKeyStr);
  if (!cellData || !cellData.images || !cellData.images[imgIdx]) return;
  const imgObj = cellData.images[imgIdx];
  let data = imgObj.data;
  if (imgObj.original) {
    const parts = cellKeyStr.split('-');
    data = await addWatermark(imgObj.original, getSeatNameSync(parseInt(parts[0]), parts[1], parseInt(parts[2])));
  }
  previewImage.src = data;
  pvReset();
  previewModal.classList.add('show');
}

function closePreview() { previewModal.classList.remove('show'); previewImage.src = ''; }
previewClose.addEventListener('click', closePreview);
previewWrap.addEventListener('click', (e) => { if (e.target === previewWrap) closePreview(); });

previewWrap.addEventListener('touchstart', (e) => {
  if (e.touches.length === 2) {
    e.preventDefault();
    pvPinching = true; pvDragging = false;
    const dx = e.touches[0].clientX - e.touches[1].clientX;
    const dy = e.touches[0].clientY - e.touches[1].clientY;
    pvLastDist = Math.sqrt(dx * dx + dy * dy);
  } else if (e.touches.length === 1) {
    pvDragging = true; pvPinching = false;
    pvLastX = e.touches[0].clientX; pvLastY = e.touches[0].clientY;
  }
}, { passive: false });

previewWrap.addEventListener('touchmove', (e) => {
  if (pvPinching && e.touches.length === 2) {
    e.preventDefault();
    const dx = e.touches[0].clientX - e.touches[1].clientX;
    const dy = e.touches[0].clientY - e.touches[1].clientY;
    const dist = Math.sqrt(dx * dx + dy * dy);
    if (pvLastDist > 0) {
      const ratio = dist / pvLastDist;
      const newScale = Math.max(0.5, Math.min(5, pvScale * ratio));
      // 缩放中心 = 双指中点
      const midX = (e.touches[0].clientX + e.touches[1].clientX) / 2;
      const midY = (e.touches[0].clientY + e.touches[1].clientY) / 2;
      // 调整平移，使中点下的图像点保持不动
      pvTX = midX - (midX - pvTX) * (newScale / pvScale);
      pvTY = midY - (midY - pvTY) * (newScale / pvScale);
      pvScale = newScale;
      pvApply();
    }
    pvLastDist = dist;
  } else if (pvDragging && e.touches.length === 1) {
    e.preventDefault();
    pvTX += e.touches[0].clientX - pvLastX;
    pvTY += e.touches[0].clientY - pvLastY;
    pvApply();
    pvLastX = e.touches[0].clientX; pvLastY = e.touches[0].clientY;
  }
}, { passive: false });

previewWrap.addEventListener('touchend', (e) => {
  if (e.touches.length < 2) { pvPinching = false; pvLastDist = 0; }
  if (e.touches.length === 0) pvDragging = false;
});

previewWrap.addEventListener('wheel', (e) => {
  e.preventDefault();
  const factor = e.deltaY > 0 ? 0.9 : 1.1;
  const newScale = Math.max(0.5, Math.min(5, pvScale * factor));
  // 以鼠标位置为中心缩放
  const rect = previewWrap.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;
  pvTX = mx - (mx - pvTX) * (newScale / pvScale);
  pvTY = my - (my - pvTY) * (newScale / pvScale);
  pvScale = newScale;
  pvApply();
}, { passive: false });

// ============================================================
// 九、批量清理（自定义步进器日期选择，避免移动端原生控件覆盖）
// ============================================================

const cleanupModal = document.getElementById('cleanup-modal');
const cleanupYearVal = document.getElementById('cleanup-year-val');
const cleanupMonthVal = document.getElementById('cleanup-month-val');
const cleanupDayVal = document.getElementById('cleanup-day-val');

let cleanupYear = 2026, cleanupMonth = 6, cleanupDay = 10;

/** 初始化清理日期为1天前 */
function initCleanupDate() {
  const d = new Date();
  d.setDate(d.getDate() - 1);
  cleanupYear = d.getFullYear();
  cleanupMonth = d.getMonth() + 1;
  cleanupDay = d.getDate();
  updateCleanupDisplay();
}

/** 更新显示 */
function updateCleanupDisplay() {
  cleanupYearVal.textContent = cleanupYear;
  cleanupMonthVal.textContent = cleanupMonth;
  cleanupDayVal.textContent = cleanupDay;
}

/** 获取清理日期值 */
function getCleanupDateValue() {
  return `${cleanupYear}-${String(cleanupMonth).padStart(2, '0')}-${String(cleanupDay).padStart(2, '0')}`;
}

// 步进器按钮事件（挂在弹窗上，避免被主事件委托拦截）
cleanupModal.addEventListener('click', (e) => {
  const btn = e.target.closest('[data-action^="step-"]');
  if (!btn) return;
  e.stopPropagation();
  const action = btn.dataset.action;
  if (action === 'step-year-up') cleanupYear++;
  else if (action === 'step-year-down') cleanupYear = Math.max(2020, cleanupYear - 1);
  else if (action === 'step-month-up') { cleanupMonth++; if (cleanupMonth > 12) cleanupMonth = 1; }
  else if (action === 'step-month-down') { cleanupMonth--; if (cleanupMonth < 1) cleanupMonth = 12; }
  else if (action === 'step-day-up') { cleanupDay++; if (cleanupDay > 31) cleanupDay = 1; }
  else if (action === 'step-day-down') { cleanupDay--; if (cleanupDay < 1) cleanupDay = 31; }
  updateCleanupDisplay();
});

document.getElementById('cleanup-cancel-btn').addEventListener('click', () => {
  cleanupModal.classList.remove('show');
});

document.getElementById('cleanup-exec-btn').addEventListener('click', async () => {
  const dateVal = getCleanupDateValue();
  if (!dateVal) { showToast('请选择日期'); return; }
  const threshold = new Date(dateVal + 'T00:00:00+08:00').getTime();
  if (isNaN(threshold)) { showToast('日期格式无效'); return; }

  cleanupModal.classList.remove('show');
  showToast('正在清理，请稍候...');

  try {
    const all = await dbGetAll('cells');
    let totalDeleted = 0;
    for (const record of all) {
      if (!record.images) continue;
      const filtered = record.images.filter(img => {
        const ts = img.createdAt || 0;
        return ts >= threshold;
      });
      if (filtered.length < record.images.length) {
        totalDeleted += record.images.length - filtered.length;
        if (filtered.length > 0) {
          await saveCellData(record.key, filtered);
        } else {
          await dbDelete('cells', record.key);
        }
      }
    }
    await buildSeatHasImages();
    renderMain();
    showToast(`已清理 ${totalDeleted} 张图片`);
  } catch (err) {
    console.error('清理出错:', err);
    showToast('清理出错，请重试');
  }
});

  setTimeout(() => t.remove(), 2100);
}

// ============================================================
// 十一、事件委托
// ============================================================

app.addEventListener('click', async (e) => {
  const target = e.target;

  // 楼层
  const floorBtn = target.closest('[data-action="toggle-floor"]');
  if (floorBtn) {
    const fid = parseInt(floorBtn.dataset.floor);
    state.expandedFloors.has(fid) ? state.expandedFloors.delete(fid) : state.expandedFloors.add(fid);
    saveUIState(); renderMain(); return;
  }

  // 区域
  const areaBtn = target.closest('[data-action="toggle-area"]');
  if (areaBtn) {
    const fid = parseInt(areaBtn.dataset.floor), aname = areaBtn.dataset.area;
    const ak = areaKey(fid, aname);
    state.expandedAreas.has(ak) ? state.expandedAreas.delete(ak) : state.expandedAreas.add(ak);
    saveUIState(); renderMain(); return;
  }

  // 座位
  const seatBtn = target.closest('[data-action="toggle-seat"]');
  if (seatBtn) {
    const fid = parseInt(seatBtn.dataset.floor), aname = seatBtn.dataset.area, sidx = parseInt(seatBtn.dataset.seat);
    const sk = seatKey(fid, aname, sidx);
    const prev = [...state.expandedSeats];
    state.expandedSeats.clear();
    if (!prev.includes(sk)) state.expandedSeats.add(sk);
    saveUIState(); renderMain(); return;
  }

  // 新增座位
  const addBtn = target.closest('[data-action="add-seat"]');
  if (addBtn) {
    const fid = parseInt(addBtn.dataset.floor), aname = addBtn.dataset.area;
    const ak = areaKey(fid, aname);
    const newCount = getAreaSeatCount(fid, aname) + 1;
    state.areaSeatCounts[ak] = newCount;
    await saveAreaSeatCount(ak, newCount);
    const seatContainer = document.getElementById('seats-' + ak);
    if (seatContainer) {
      seatContainer.innerHTML = renderSeatFlow(fid, aname);
      state.expandedSeats.forEach(sk => renderTimeSlots(sk));
    }
    showToast(`已新增座位 ${getSeatNameSync(fid, aname, newCount - 1)}`);
    return;
  }

  // 删除座位
  const delSeatBtn = target.closest('[data-action="delete-seat"]');
  if (delSeatBtn) {
    const sk = delSeatBtn.dataset.seatKey;
    if (!confirm('确定删除该座位及其所有图片？')) return;
    const parts = sk.split('-');
    const fid = parseInt(parts[0]), aname = parts[1], sidx = parseInt(parts[2]);
    // 删除该座位所有单元格数据
    for (let t = 0; t < TIME_SLOTS.length; t++) {
      await dbDelete('cells', cellKey(fid, aname, sidx, t));
    }
    // 删除自定义名称
    await dbDelete('seatNames', sk);
    delete state.seatNames[sk];
    // 标记为已删除
    state.deletedSeats.add(sk);
    await saveDeletedSeat(sk);
    // 更新状态
    state.seatHasImages.delete(sk);
    state.expandedSeats.delete(sk);
    // 从选中列表移除相关
    state.selectedCells = state.selectedCells.filter(ck => cellToSeatKey(ck) !== sk);
    updateBottomBar();
    saveUIState(); renderMain();
    showToast('座位已删除');
    return;
  }

  // 复选框
  const checkbox = target.closest('[data-action="toggle-select"]');
  if (checkbox) {
    const ck = checkbox.dataset.cellKey;
    const idx = state.selectedCells.indexOf(ck);
    if (idx >= 0) { state.selectedCells.splice(idx, 1); checkbox.classList.remove('checked'); }
    else { state.selectedCells.push(ck); checkbox.classList.add('checked'); }
    updateBottomBar(); return;
  }

  // 拍照
  const captureBtn = target.closest('[data-action="capture"]');
  if (captureBtn) {
    const ck = captureBtn.dataset.cellKey;
    const cellData = await getCellData(ck);
    if (cellData && cellData.images && cellData.images.length >= MAX_IMAGES) { showToast('该时段图片已满'); return; }
    currentCaptureCellKey = ck; captureInput.value = ''; captureInput.click(); return;
  }

  // 上传
  const uploadBtn = target.closest('[data-action="upload"]');
  if (uploadBtn) {
    const ck = uploadBtn.dataset.cellKey;
    const cellData = await getCellData(ck);
    if (cellData && cellData.images && cellData.images.length >= MAX_IMAGES) { showToast('该时段图片已满'); return; }
    currentUploadCellKey = ck; uploadInput.value = ''; uploadInput.click(); return;
  }

  // 删除图片
  const delBtn = target.closest('[data-action="delete-img"]');
  if (delBtn) {
    const ck = delBtn.dataset.cellKey, imgIdx = parseInt(delBtn.dataset.imgIdx);
    const cellData = await getCellData(ck);
    let images = (cellData && cellData.images) ? [...cellData.images] : [];
    if (imgIdx >= 0 && imgIdx < images.length) {
      images.splice(imgIdx, 1);
      if (images.length > 0) await saveCellData(ck, images);
      else await dbDelete('cells', ck);
      const sk = cellToSeatKey(ck);
      const p = ck.split('-');
      let still = false;
      for (let t = 0; t < TIME_SLOTS.length; t++) {
        const td = await getCellData(`${p[0]}-${p[1]}-${p[2]}-${t}`);
        if (td && td.images && td.images.length > 0) { still = true; break; }
      }
      still ? state.seatHasImages.add(sk) : state.seatHasImages.delete(sk);
      updateSeatVisual(sk);
      await renderTimeSlots(sk);
    }
    return;
  }

  // 预览
  const previewBtn = target.closest('[data-action="preview"]');
  if (previewBtn) { showPreview(previewBtn.dataset.cellKey, parseInt(previewBtn.dataset.imgIdx)); return; }

  // 编辑座位编号
  const nameEl = target.closest('[data-action="edit-seat-name"]');
  if (nameEl) {
    const sk = nameEl.dataset.seatKey, curName = nameEl.textContent;
    const input = document.createElement('input');
    input.type = 'text'; input.value = curName; input.className = 'seat-name-edit-input';
    const doSave = async () => {
      const newName = input.value.trim() || curName;
      if (newName === curName) {
        const span = document.createElement('span');
        span.className = 'seat-name-text'; span.dataset.action = 'edit-seat-name'; span.dataset.seatKey = sk; span.textContent = newName;
        if (input.parentNode) input.replaceWith(span);
        return;
      }
      state.seatNames[sk] = newName;
      await saveSeatName(sk, newName);
      const span = document.createElement('span');
      span.className = 'seat-name-text'; span.dataset.action = 'edit-seat-name'; span.dataset.seatKey = sk; span.textContent = newName;
      if (input.parentNode) input.replaceWith(span);
      updateSeatButtonText(sk, newName);
      await regenerateWatermarksForSeat(sk);
    };
    input.addEventListener('blur', doSave);
    input.addEventListener('keydown', (ev) => { if (ev.key === 'Enter') input.blur(); });
    nameEl.replaceWith(input); input.focus(); input.select();
    return;
  }

  // 打开批量清理
  const cleanupBtn = target.closest('[data-action="open-cleanup"]');
  if (cleanupBtn) {
    initCleanupDate();
    cleanupModal.classList.add('show');
    return;
  }
});

function updateSeatButtonText(sk, newName) {
  document.querySelectorAll('.seat-btn').forEach(btn => {
    const k = seatKey(parseInt(btn.dataset.floor), btn.dataset.area, parseInt(btn.dataset.seat));
    if (k === sk) btn.textContent = newName;
  });
}

async function regenerateWatermarksForSeat(sk) {
  const parts = sk.split('-');
  const fid = parseInt(parts[0]), aname = parts[1], sidx = parseInt(parts[2]);
  const sName = getSeatNameSync(fid, aname, sidx);
  for (let t = 0; t < TIME_SLOTS.length; t++) {
    const ck = cellKey(fid, aname, sidx, t);
    const cellData = await getCellData(ck);
    if (!cellData || !cellData.images) continue;
    let changed = false;
    for (let i = 0; i < cellData.images.length; i++) {
      if (cellData.images[i].original) {
        cellData.images[i].data = await addWatermark(cellData.images[i].original, sName);
        changed = true;
      }
    }
    if (changed) await saveCellData(ck, cellData.images);
  }
  await renderTimeSlots(sk);
}

// ============================================================
// 十二、初始化
// ============================================================

async function init() {
  try {
    await openDB();
    state.seatNames = await getAllSeatNames();
    state.areaSeatCounts = await getAllAreaSeatCounts();
    state.deletedSeats = await getAllDeletedSeats();
    await buildSeatHasImages();
    loadUIState();
    renderMain();
  } catch (err) {
    console.error('初始化失败:', err);
    app.innerHTML = '<p style="padding:20px;color:red;">初始化失败，请检查浏览器是否支持 IndexedDB。</p>';
  }
}

init();
</script>
